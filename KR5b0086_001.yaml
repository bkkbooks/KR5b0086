front:
  text: 黃庭內景玉經注卷上
  hash: sha256:2e3a2bca0e028165247da9c4dfb2ffd2b9df4a0bcd2bb6bc754e349700b3f03b
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5b0086_HFL_001-001a, image: hfl/0190/0190-010.png}
body:
  text: 梁丘子注黃者中之色也庭者四方之中也外指事即天中人中地中內指事即腦中心中脾中故曰黃庭內者心也景者象也外象論即日月星辰雲霞之象也內象論即血肉筋骨臟腑之象也心居身內存觀一體之象色故曰內景也上清章第一上清紫霞虛皇前三清之境有玉清上清太清此三清之中一切大聖之所居也按玉緯經云上清者虛皇大道君之所治也即大域之城色羅三清又常朝儀西南方有太靈虛皇天尊即元始之本號也道君欲明作七言之所始乎紫霞之宫也亦名紫瓊宫亦曰紫晨之宫太上大道玉晨君太上尊之號也按本行經有無始五老之君號也玉晨君即皇老之一號也間居蘂珠作七言祕要經云仙宫中有寥陽之殿藥珠之闕七映之房道君在中而説經也人身備有之也散化五形變萬神謂隳交體黜聰明離形去智同於大通先本後迹故假神以託用也夫神者隨感而應者也故有其數豈直萬乎是為黃庭曰內篇因中而得名也琴心三疊舞胎仙琴和也疊積也存三丹田使和積如一則胎仙可致也胎仙胎息之仙也猶胎在腹中有氣而無息九氣映明出霄間三田之中有九氣炳煥無不燭也大洞經云三丹曰及三元三洞房合為九宫宫中有天皇九魄變為九氣化為九神也神盍童子生紫煙觀照存思假日為事下文云眉號華蓋覆明珠華盞即神蓋謂眉也明珠目童子也紫煙目精妙之氣是曰玉書可精研文因迹始專則能通詠之萬遇升三天精備神充名上三清千災以消百病痊精神具則災病自消不憚虎狼之凶殘元殘傷也亦以却老年永延此一章都説黃庭之道也上有章第二上有魂靈下闕元上魂天分也下關地分也魂靈無形關元有質人法天地形象具之一如後説左為少陽右太隂左東右四卯生酉殺後有密户前生門前南後北密户後二竅言隱密也生門前七竅言藉以生也合為九竅也出日入月呼吸存日月者隂陽之精也左出右入身有隂陽之氣出為呼氣入為吸氣呼吸之間心當存之上清紫文云心存日月坐立任所便是也元氣所合列宿分元氣一也使心與道一合存日月星辰輝光照耀羅列一身分明與天地合也紫煙上下三素雲紫煙是目精之氣存見三丹田中上下俱有白氣白氣流通一體又云目光有紫青絳三色為三素雲仙經云雲林夫人呪曰目童三雲兩日真君灌溉五華植靈根素雲之氣在口為玉液存咽之以灌五華五華者五臟之英華靈根命根植生七液洞流衝盧間七竅之液上下周流上流曰衝下流曰回廬客額廬間明堂中回紫抱黃入丹田內象論也脾氣黃目氯紫七液周流抱黃回紫出入呼吸俱入丹田丹田有三所靈命之根也按大洞經云眉間却入三分為雙田入骨際三分為一闕左為青房右為紫户二神居之眉間却入一寸為明堂宫左明童真君右明女真官中明鏡神君眉間却入二寸為洞房左無英君右白元君中央黃老魂眉間却入三寸為丹田宫亦名泥丸宫左有上元赤子君右有帝鄉君又却入四寸為流珠宫有流珠真神居之又却入五寸為玉帝宫有玉清神毋居之又當明堂上一寸為天庭宫有上清神女居之又洞房直上一寸為極真宫太極帝妃居之又丹田直上一寸為丹玄宫有中黃太一君居又流珠直上一寸為太皇宫太上君居之男為雄一女為雌一雄雌二神男女益可兼修之幽室內明照陽門幽隱之室內自思存心目明鑒燎如日月夫神者無方之謂也心識無方存之則有遣之則亡口為章第三口為玉池太和官口甲津液為玉液一名醴泉亦名玉漿貯水為池百節調柔五臟和適皆以口為官主也一本有作太和宫於文韻不便也大洞經云心存胃口有一女子嬰兒形無衣服正立胃管張口水注魂液仰吸五氣當即漱滿口中內外津液滿口咽之遺直入玄女口中五遇畢叩齒三通微呪曰玉清高上九天九靈化在玄女下入胃清金和玉映心開神朗服食日精金華充盈漱咽靈液災不干靈液真氣邪不干正體生光華氣香蘭不食五榖無穢滓也却減百邪玉鍊顔肌膚若霜雪綽約若處子容能修之登廣寒廣寒北方仙宫之名又云山名亦曰廣霞洞真經云冬至之日月伏於廣寒之宫其時育養月魄於廣寒之池天人採青華之林條以拂日月光也晝夜不寢乃成真勤修靜定則為真人雷鳴電激神泯泯泯泯取平聲讀調神理氣精魄恬愈雖遇震雷而不驚懾又曰雷鳴電激為叩齒叩齒存思乃是神用不得言泯泯黃庭章第四黃庭內人服錦衣黃庭內人謂道母黃庭真人謂道父人身備有之錦衣具五色也即謂五臟之真氣也三庭之中備有之紫華飛裙雲氣羅十方經云髙上玉皇衣文明飛雲之裙即神仙之所服也丹青緑條翠靈柯五色雜氣共生枝條仙衣之飾七𤯹玉籥閉兩扉外象諭也七竅開闔以諭關崙用之以道不妄開也𤯹籥之飾也存神必閉目故名曰閉兩扉重扉金關密樞機金取堅剛也老子云善閉者無關捷而不可開言養生者善守精神不妄泄也玄泉幽闕高崔巍玄泉口中之液也一曰玉泉一名醴泉一名玉液一名玉津一名玉漿兩眉間為闕庭兩腎間為幽闕如門之左右象魏中間闕然為道腎在身中故曰幽闕也據腎在五臟之下而云高者形伏存神即在丹田之上故言髙也三田之中精氣微內指事也丹田之中神氣變化感應從心非有非無不可為色象從粗入妙必其有係故以氣言之氣以心為主因主立象至精至微不可數求也道機經云天有三光日月星人有三寶三丹田三丹田中氣左青右黃上白下黑也嬌女窈窕翳霄暉真誥云嬌女耳神名言耳聰朗徹明掩玄暉也重堂煥煥明八威重堂喉嚨名也一曰重樓一曰重環本經云絳宫重樓十二級絳宫心也喉嚨在心上故曰重堂喉嚨者津液之路流通上下滋榮一體煥明八方八卦之神曰八威也天庭地關列斧斤兩眉間為天庭紫微夫人祝曰開道天庭使我長生列斧斤言勇壯靈臺盤固永不衰心為靈臺言有神靈居之靜則守一動則存神神具體安不衰竭矣中池章第五中池內神服赤珠膽為中池舌下為筆池小腹胞為玉池亦三池之通名膽部曰龍旗橫天擲火鈴赤珠者火鈴之服丹錦雲袍帶虎符丹錦雲袍心肺之色也在膽之上故曰雲袍符命符也九真經云皇老君佩玄龍神虎符帶流金之鈴並道君之服也橫津三寸靈所居內指事也臍在胞上故曰橫津臍下三寸為丹田真人赤子之所居也隱芝翳鬱自相扶謂男女之形體也隱翳交合自然之道按內外神芝訣云五臟之液為內芝內芝則隱芝也又云隱奧者也天中章第六天中之嶽精謹修天中之嶽謂鼻也一名天臺消魔經云鼻欲數按其左右令人氣平所謂溉灌中嶽名書帝録靈宅既清玉帝遊面為靈宅一名尺宅以眉目鼻口之所居故為宅也修之清通則神仙矣洞神經曰面為尺宅字或作赤澤通利道路無終休太素丹景經曰一面之上常欲兩手摩拭之髙下隨形不休息則通利耳目鼻口之氣脈眉號華蓋覆明珠明珠目也九幽日月洞空無五辰行事訣云眉上直入一寸為玉璫紫闕左日右月又玉歷經云太清上有五色華蓋九重人身亦有之當存日童如日月之明也宅中有真常衣丹真謂心神即赤城童子也亦名真一亦名赤子亦名子丹亦名真人心存見之常存目前與心相應衣丹象心氣赤色也審能見之無疾患元陽子曰常存心神則無病也赤珠靈裙華蒨祭玄膺之象色外論也舌下玄膺生死岸內指事玄膺者通津液之岸也本經云玄膺氣管受精府出清入玄二氣煥謂吐納隂陽二氣煥然著明也子若遇之升天漢人能善遇吐納之理則成天仙矣至道章第七至道不煩決存真專心則至泥丸百節皆有神神者妙萬物而為言因象立名則如下説髮神蒼華字太元白與黑謂之蒼最居首上故曰太元腦神精根字泥丸丹田之宫黃庭之舍洞房之主隂陽之根泥九腦之象也眠神明上字英玄目諭日月在首之上故曰明上英玄童子之精色也內指事也鼻神玉壟字靈堅玉壟之骨象玉也神氣通天出入不竭故曰靈堅耳神空間字幽田空間幽靜聰物則審神之所居故曰田也舌神通命字正倫咽液以舌性命得正其五味各有倫理齒神崿鋒字羅千牙齒堅利如劒崿刀鋒推羅衆物而食之者也一面之神宗泥丸腦中丹田百神之主泥丸九真皆有房大洞經云三元隱化則成三宫三三如九故有三丹田又有三洞房合上三元為九宫中有九真神三九二十七神氣相和人當存之亦謂天皇九魄變成九氣化為九神各居一洞房方圓一寸處此中房有一寸故腦有瓣也同服紫衣飛羅裳九真之服皆象氣色飛猶輕也但思一部壽無窮存思九真不死之道非各别住俱腦中丹田之中衆神所居列位次坐向外方神繞丹田而外其面以扞不祥八素經云真有九品向外列值則當上真上向髙真南向太真東向神真西向玄真北向仙真東北向天真東南向靈真西南向至真西北向夫真者不視而明不聽而聰不言而正不行而從所存在心自相當心存玄真內外相應心神章第八心神丹元字守靈內象論也心為臟腑之元南方火之色栖神之宅故曰守靈也肺神皓華字虛成肺為心之華蓋皓白也西方金之色肺色白真贊輕虛故曰虛成也肝神龍煙字含明肝位木行東方青龍之色也於藏主目日出東方木生火故曰含明翳鬱導煙主濁清翳鬱木象也得火而煙生得陽而氣生清則目明濁即目暗有別本無此一句腎神玄冥字育嬰腎屬水故曰玄冥腎精為子故曰育嬰也脾神常在字魂停脾中央土位也故田常在即黃庭之宫也脾房食消神康力壯故曰魂停膽神龍矅字威明膽色青黃故田龍矅主於勇捍故曰威明外取東方青龍雷震之象者也六府五臟神體精資保一身廢一不可故曰神體精心肝肺腎脾為五臟膽胃大腸小腸膀胱三焦為六腑所言腑者猶府色之府取中受物之義故曰腑也臟者各是一質共藏於身故謂之臟也言三焦者多矣而未的其真蓋心肝肺三臟之上係管之中為三焦中黃經云肺首為三焦當指其所也又據五方之色脾為中黃應為五臟之主而今共以心為主者何也答曰心居臟中其質虛受也夫虛無者神識之體運用之源故遍方而得其主動用而獲其神不可以象數言不可以物類取皆在心內運天經五臟六腑各有所司皆有法象同天地順隂陽自然戚攝之道故曰運天經也畫夜存之自長生依上五神服色思存不捨不死之道也仙經曰存五臟之氣變為五色雲常在頂上覆蔭一身日居於前月居於後左青龍右白虎前朱雀後玄武即去邪長生之道也肺部章第九肺部之宫似華蓋金官也肺在五臟之上四垂為字也下有童子坐玉闕童子名皓華肺形如蓋故以下言之玉闕者腎中白氣上與肺連也七元之子主調氣元陽子曰七元之君負甲持符辟除凶邪而布氣七竅主耳目聰明七元七竅之元氣也外應中嶽鼻臍位中嶽者鼻也又為臍也臍為崑崙之山鼻為七氣之門位猶主也素錦衣裳黃雲帶素錦衣裳肺膜之色也黃雲帶者肺中之黃脈蔓延羅絡有象雲氣喘息呼吸體不快有時而然急存白元和六氣白元君主肺宫也大洞經云白無君者居洞房之右是也神仙久視無笑害邪不干正用之不巳形不滯常存此道形氣華榮至誠感神之所致也心部章第十心部之宫蓮含華火宫也心臟之質象道華之未開也下有童子丹元家心神丹元字守靈神在心內而云下者據華蓋而言主適寒熱榮衛和寒熱隂陽靜躁之義也人當和適以營衛其身老子云躁勝寒靜勝熱清淨以為天下正丹錦飛裳披玉羅象心臟之色也有肺之白氣象玉羅金鈴朱帶坐婆娑金鈴內藥之象朱帶血脈之象生婆娑者言神之安靜也九真經云黃老君帶流金之鈴仙服也調血理命身不枯心安體和則無病夭外應口舌吐五華心主口舌吐納五臟之液辨識五行之味故言外應臨絶呼之亦登蘇有病厄當存丹元童子朱衣赤冠以救護之也久久行之飛太霞常修此道能獲飛仙肝部章第十一肝部之宫翠重裹木宫也肝色蒼翠大小相重之象也下有青童神公子肝東方木位主青故曰青童左位為公子公子一名含明上有華蓋故曰下主諸關鏡聰明始於時主春青陽之本始於竅主目五行之關鏡也故田聰明之始青錦披裳佩玉鈴青錦肝之色玉鈴白脈垂之象也升玄經云三天玉帝蒂火玉之珮素靈經云靈耀君衣青錦單裳皆神仙之服也和制魂魄津液平內指事也東春和煦萬物生成外應眼目日月清肝位屬眼象日月明百痾所鍾存無英左為無英肝神在左故存之有本為無英無英者物生之象也同用七日自充盈五藏兼存故言同用七日為一竟一竟一復也故周易曰七日來復是也垂絶念神死復生存念青衣童子形如上説攝魂還魄永無傾太微靈書云每月三日十三日二十三日夕三魄棄身遊外攝之者當仰眠去枕伸足交手心上瞑目閉氣三息叩齒三通存心中有赤氣如雞子從內出於咽中赤氣轉大覆身變成火以燒身使幣覺體中小熱呼三魂名曰爽靈胎光幽精即微呪曰太微玄宫中黃始青內鍊三魂胎光安寧神寶玉室與我俱生不得妄動鑒者太靈者欲飛行唯詣上清若有飢渴得飲玄水玉精又每月朔望晦日七魄流蕩交通鬼魅制檢還魄之法當此夕仰眠仲足掌心掩兩耳令指相接於項上閉息七遍叩齒七道心存鼻端白氣如小豆大須臾漸大冠身上下九重氣忽變成兩青龍在兩目中兩白虎在兩鼻孔中皆向外朱鳥在心上向人口蒼龜在左足下靈蛇在右足下兩玉女者錦衣手把火光當兩耳門畢咽液七遇呼七魄名曰尸狗伏矢雀隂吞賊非毒除穢臭肺即微呪曰素氣九四制魄邪姦天獸守門嬌女執關鍊既和柔與我相安不得妄動看察形源若有飢渴聽飲月黃日丹腎部章第十二腎部之宫玄關圓水宫也玄關圓者腎之形狀也玄水色內象論也中有童子冥上玄腎為下玄其神玄冥字育嬰心為上玄上玄幽遠氣與腎連故言冥上玄主諸六府九液源五臟六腑九液交連百脈通流廢一不可六腑如上説九液九竅之津液外應兩耳百液津腎宫主耳氣衰則聾陰陽和合血液流通蒼錦雲衣舞龍幡蒼錦腎色之象也雲衣腎膜之象也龍幡青脈之象也九真經云道君服青錦衣蒼華之裙也上致明霞日月煙腎氣充足耳目聰明隂陽不衰外象論也百病千災急當存元陽子曰寒暑相生男女相成腎中二神常衣青左男戴日右女戴月存想見之則永無炎患者也兩部水王對生門腎臟雙對故曰兩部腎宫水王則化為赤子故曰對生門使人長生升九天赤子化為真人面升九天九天者謂九氣青天其氣主生者也黃庭內景玉經注卷上
