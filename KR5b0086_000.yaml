body:
  text: 黃庭內景玉經訣推七黃庭內景玉經者一名太上琴心文琴和也誦之可以和六府寧心神使人得仙也一名大帝金書扶桑大帝君宫中𧗁誦此經以金簡刻書之故曰金書一名東華玉篇東華者東方諸宫名也東海青童君所居其中玉女仙人皆誦詠之刻玉書之故為玉篇也當清齋九十日誦之萬過使調和三魂制鍊七魄除去三尸安和六府五藏生華色及嬰孩百病不能傷災害不得干萬過既畢自然洞觀鬼神內視腸胃得見五藏其時當有黃庭真人東華玉女教子之神仙焉此文不死之道也子有仙相得吾此書也此文羅列一形之神室處胎神之所在耳恆誦詠之者則神室明正胎真安寧靈液流通百關調暢血髓充溢腸胃虛盈五藏結華耳目聰明白髮還黑朽齒更生所以却邪痾之紛若者謂我巳得魂精六絳之姓名也形充种寧而曰欲死不可得也故曰內景黃庭為不死之道受道齋九日或七日或三日然後受之授者為師受者奉焉結盟立誓期以勿泄古者盟用玄雲之錦九十尺金簡鳯文之羅四十尺金鈕九雙以代割髮歃血不泄之約此物是神鄉之奇帛非赤縣之所有也今錦可用白絹羅可用青布鈕可用金鐶亦足以誓信九天制告三官矣皆奉有經之師散之寒栖違盟負誓七祖受考於湯谷河源身為考鬼於風刀也湯谷中山王口訣也一人受書得傳九人審視形氣必慈仁忠信耽玄注真者不毁真正敬樂神仙乃可示耳非其才是為漏泄謹量可授亦誠難也又先求感應推訊虛靈者乃佳也審可傳者亦將夢以告悟臨時之冝亦玄解於心矣宣泄之科既重傳之者良為嶮㠠有黃庭內經之子寧不慎密之哉清虛真人口訣夫內景黃庭經者扶桑大帝君之金書鍊真之袐言也讀黃庭內景經者常在别室燒香潔盛乃執之也諸有此經辟百邪若入山林及空暗之地心中震怖者正心向北讀內經一過即神靜意平如與千人同旅而止能讀之萬遇自見五藏腸胃及天下鬼神役使在已若困病者心存讀之垂死亦愈大都忌食六畜魚臊五辛殗淨之事若脫履之者沐浴盟漱燒香於左右讀經一過百痾除也右小君言暮卧先讀黃庭經一過乃眠使人魂魄自制鍊得三四過乃佳也夫萬法以人為主人則以心為宗無主則法不生無心則身不立心法多門取用非一有無二體隨事應機故有凡聖淺深愚智真假莫匪心神辨識運用之所由也但天下之道殊塗而同歸百慮而一致從粗入妙權實則有二階吻迹符真是非同乎一見有黃庭內景經者東華之所祕也誠學仙之要妙羽化之根本余襞習未周而觀想粗得裁靈萬品模擬一形義有四宗會明七字指事象論內外兩言絀聰隳體之餘任噓從呬之睱舐筆磨墨輒貽原筮
