body:
  text: 梁丘子注隱景章第二十四隱景藏形與世殊學仙之士含光藏輝滅跡匿端含氣養精口如朱肌膚若冰雪綽約若處子帶執性命守虛無虛靜恬淡寂寞無為名入上清死録除得補真人列象玄名三神之樂由隱居理身無為則神樂理國無事則人安三神三丹田之神也倐歘遊邀無遺憂倏歘疾發也下文云駕歘接生宴東蒙或云倐歘龍名也元遺憂謂懸解羽服一整八風驅八風八方之風先驅掃路也羽服仙服按上清寶文仙人有五色羽衣又飛行羽經云太一真人衣九色飛雲羽章皆神仙之服也控駕三素乘晨霞外指事也三雲九霞神仙之所御也金輦正立從玉輿元録經云上清九天玄神八聖驂駕九鳳龍車玉輿金輦皆仙人之服器何不登山誦我書書即黃庭經也鬱鬱窈窈真人墟山中幽邃入山何難故躊躇情志不決人間紛紛臭如帤疾人間世不可居帤幣惡之帛也五行章第二十五五行相推及歸一五行謂水火金木土相推者水生木木生火火生土土生金金生水水又生木周而復始又相刻法水刻火火刻金金刻木木刻土土刻水水刻火周而役始相推之道也反歸一者水數也五行之首萬物之宗老子云道生一一生二二生三三生萬物又易有太極是生兩儀太極者一也兩儀天地天地生萬物萬物又終而歸一一者無二之稱萬物之所成終故云歸一三五氣合九九節妙真經云三者在天為日月星名曰三光在地為珠玉金名曰三寶在人為耳鼻口名曰三生天地人凡三而各懷五故曰三五其常精也合三三者為九宫夫三五所懷順衆類也調和萬物理化隂陽覆載天地光明四海風兩雷電春秋冬夏寒暑溫凉清濁之氣諸生之物不得三五不立也故曰天道不遠三五復返三五者天地之樞帶六合之要會九宫之氣節九九八十一為一章云云可用隱地回八術九官中有隱遁變化之法太上八素奔晨隱書是曰八術又太微八録術云太微中有三君一曰太皇君二曰天皇君三曰黃老君三元之氣混成之精出入上清太素之宫能存思之必得長生伏牛幽闕羅品列伏牛腎之象腎為幽闕中黃經云左腎為玄妙君右腎為玄元君羅品列存思見之三明出華生死際天三明日月星人三明耳目口地三明文章華是生死之際際音飾也洞房靈象斗日月存三光於洞房洞房明堂巳釋於上者也父曰泥丸毋雌一明堂中有君臣洞房中有夫婦丹田中有父母泥丸腦神名老子云知其雄守其雌雌無為一也三光煥照入子室明白四達能存玄真萬事畢莊子曰通於一萬事畢也一身精神不可失常存念之不舍須臾髙奔章第二十六髙奔日月吾上道吾道君也上清紫文吞日氣法一名赤丹金精石景水毋玉胞經其法常以日初出時東向叩齒九通畢微呪日魂名日中五帝字日魂珠景照韜緑映回霞赤童玄炎飈象呼此十六字畢冥目握固存五色流霞來接一身於是日光流霞俱入口中又上清紫書有吞月精之法月初出時西向叩齒十通微呪月魂名月中五夫人字月魄暖蕭芳艷翳廖婉虛靈蘭鬱華結翹淳金清瑩炅容臺標呪呼此二十四字畢冥目握固存月中五色精光俱入口中又於光中有黃氣大如目童名曰飛黃月華玉胞之精也能修此道則奔日月而神仙矣鬱儀結璘善相保鬱儀奔日之仙結璘奔月之仙同聲相應同氣相求故二仙來相保持也乃見玉清虛無老升三清之上與道合同也可以回顔填血腦魂魄反嬰得成真人口銜靈芒携五皇口吐五色雲氣光芒四照與五皇老君同遊六合也腰帶虎籙佩金璫仙人之服也九真經云中央黃老君腰佩龍玄神虎符帶流金之鈴執紫毛之節佩符籙駕歘接生宴東蒙歘倐歘言乘風氣忽發而往或云歘條龍名也東蒙東海仙境之山也接生之方與生氣相按連歘然而遊其處玄元章第二十七玄元上一魂魄鍊資一以鍊神神鍊以合一一之為物叵卒見一者無二之稱也心恬淡以得之知得之而不可見須得至真始顧眄守真志滿一自歸已至忌死氣諸穢賤凡飛丹鍊藥服氣吞霞等事皆忌見死尸殗穢之事此衛生家之共忌也然至道冲虛本無淨穢未獲真正則净穢有殊珠而不齊則是非起於內生死見於外則清淨者生之徒濁穢者死之徒故為養生之所忌也六神合集虛中宴六甲六丁六府等諸神俱在身中身中虛空則宴然而安樂不則憂泣矣結珠固精養神根結珠謂咽液先後相次如結珠固精不妄泄神根形軀也夫神之於身猶國之有君君之有人人以書為命君以人為本互相資藉以為生主而調養之也玉𥫽金籥常完堅老子云善閉者無闕楗不可開籥鎖籥𥫽或為匙也閉口屈舌食胎津屈舌導津液食津而胎仙故曰胎津使我遂錬獲飛仙積功勤誠之所致也仙人章第二十八仙人道士非有神修學以得之也積精纍氣以為真有本或無此句遂闕注黃童妙音難可聞黃童黃庭真人一名赤城童子妙音謂黃庭道之妙音也玉書絳簡赤丹文黃庭經一名太帝金書一名東華玉篇也字曰真人巾金巾真人即黃童也金色白在西方主肺肺白在心上故曰巾九真經曰青帝衣青玉錦衣帔蒼華飛裙建扶芝丹冠巾金巾又元陽子四真人憑午侰子履卯戴酉酉者金負甲持符暗七門老子六甲三部符云甲子神王文卿甲戌神辰子江甲申神扈文長甲午神衛上卿甲辰神孟非鄉甲寅神明文章存六甲神名則七竅開通無諸疾病火兵符圖備靈關赤章斬邪籙皆役使三五火兵又衛靈神呪田南方丹天三氣流光熒星轉燭洞照太陽上有赤精開明靈童總御火兵備守三官即火兵三五家事也符者八素六神陽精玉胎鍊仙隂精飛景黃華中景內化洞神鑒乾等諸符也圖謂太一混合三五圖六甲上下隂陽圖六甲玉女通靈圓太一真人圖東井沐浴圖老子內視圓西升八史圖九變含景圖赤界等諸圖可以守備靈關靈關即三關四關等身中真有之前昂後畢高下陳列位之形象也執劒百文舞靈幡神兵幡劒之狀十絶盤空扇紛紜空中作氣煒曄揮霍火鈴冠霄隊落煙金精火鈴冠徹霄漢都伍隊陳狀如落煙屯雲之勢安在黃闕兩眉間存思大兵氣狀俱在天庭天庭一名黃闕兩眉間是此非枝葉實是根學仙之本紫清章第二十九紫清上皇大道君亦名玉晨君也太玄太和俠侍端太玄太和真仙之嘉號也化生萬物使我仙道氣之功績也飛升十天駕玉輪乘歘而往晝夜七日思勿眠至誠則感子能行此可長存延年神仙之道積功成鍊非自然學以致其道也是由精誠亦由專守一如初成道有餘內守堅固真之真不失節度也虛中恬淡自致神神以虛受百縠章第三十百榖之實土地精草實曰榖隂之類也五味外美邪魔腥非清虛之真氣臭亂神明胎氣零胎氣謂無味之味自然之正氣也服氣有胎息之法零猶失也那從反老得還嬰言不可得髮白反黑齒落更生此一句應在自存神之下超此不類者三魂忽忽魄糜傾忽糜不恬淡糜傾朽敗也何不食氣太和精進勸服鍊之道故能不死入黃寧黃寧黃庭之道成也心典章第三十一心典一體五臟王神以虛受心為栖神之宅故為王也動靜念之道德行謂念丹元童子也夫念為有忘為無念則易心而後語忘則及心而神全故道德行清潔善氣自明光常念之故坐起吾俱共楝梁神以身為屋宅故云共棟梁吾丹元子也畫日矅景暮閉藏莊子云其覺也形開其寐也魂交交閉也通利華精調隂陽謂心种用捨與目相應華精目精也心開則目開心閉則目閉晝陽而暮隂故云調隂陽經歷章第三十二經歷六合隱卯酉舉心之用捨陰陽之所由也晝為經歷暮為隱藏六合天地內上下四方卯百也北為暮幽隱屬也兩腎之神主延壽腎神玄冥字育嬰配屬北方主暮夜人能上精則長壽河上公曰腎藏精降逍斗藏初九九陽數也斗北辰也北辰主陰謂陽氣下與隂合易曰乾吉在無首無首藏也知雄守雌可無老守雌則藏九之義也知白見黑急坐守老子云知其雄守其雌知其白守其黑皆藏九之義也肝氣章第三十三肝氣鬱勃清且長肝位東方東方木主春生氣之本也清長氣色之象羅列六府生三光存想生氣遍照五臟六脾如日月星辰光矅明朗也心精意專內不傾能之一也上合三焦下玉漿言肝氣上則與三焦氣合下則為口中之液亦猶隂氣上則為雲下則為雨雨潤萬物玉漿潤百骸九竅也玄液雲行去臭香真氣周流則無炎病矣治蕩髮齒鍊五方雲行兩施無所不通五方五臟也取津玄膺入明堂咽液之道必自玄膺下入喉嚨喉嚨一名重樓重樓之下為明堂明堂之下為洞房洞房之丁為丹田此中部下溉喉嚨神明通身命以津氣為主也坐侍華蓋遊貴京華蓋肺也肝在肺之下貴京丹田也飄颻三帝席清涼三帝三丹田中之道君也亦名真人言肝氣飄𩙝周流三丹田之所也肝氣為目精故言席清涼五色雲氣紛青葱肝氣與五臟相雜上為五色雲也閉日內眄自相望常存念之五臟自見矣使心諸神還相崇赤城童子與五臟真人合契同符共相尊敬也七玄英華開命門七竅流通無留滯也通利天道存玄根身為根本也百二十年猶可還當急修行時不可失過此守道誠獨難去死近矣唯待九轉八瓊丹九轉种丹白日升天抱朴子九丹論云考覽養生之書鳩集久視之方曾所披涉篇巳千計矣莫不以還丹金液為大要焉又黃帝九鼎神丹經云帝服之而升仙與天地相畢乘雲駕龍出入太清八瓊丹砂雄黃雌黃空青硫黃雲毋戎鹽消石等物是也要復精思存七元雖服神丹兼習黃庭之道七元者謂七星及七竅之真神也又五帝無君及白元無英君亦為七元道君洞房訣云存七元者其呪曰回無隱遁豁落七辰乃七元也日月之華救老殘左目為日右目為月目主肝配東方木行也木位春春為生氣故云救老殘肝氣開流終無端莊子曰指竅為薪而火傳生得納飬而命績也肺之童第三十四肺之為氣三焦起中黃經日肺首為三焦肺之為氣謂氣嗽氣嗽起自三焦故言三焦起說三焦者多未的其實今以為五臟之上係管為三焦焦者熱也言肝心肺頭焦熱之義也視聽幽冥候童子童子心神赤城中者元陽子曰閲離而下存童子童子是目童也謂人欲知死生當以手指柱目眥候其目光有光則生無光則死也調理五華精髮齒五華五臟之氣仙經曰髮欲數櫛齒欲數叩也三十六咽玉池裏口為王池亦曰華池膽為中池胞為玉泉華池咽液入丹田所謂溉灌靈根也開通百脉血液始身中血液以口為本始也顔色生光金玉澤百節開通齒堅髮黑不知白反老還嬰存此真神勿落落專誠不墮當憶此宫有座席此宫謂肺宫也座席神之所安中黃經云肺首為三集玄老君之所居也衆神合會轉相索衆真同聚慮有邪精隱藏章第三十五隱藏羽蓋看天舍此明脾宫之事脾為丹田黃庭中央戊已土行也上觀肝肺如蓋如舍也朝拜太陽樂相呼謂魂神與衆仙合會也素靈經云太上神仙有太陽君少陽君太虛君浩素君群仙宗道之遊樂也明神八威正辟邪八威八靈神也真誥云北帝殺鬼呪曰七正八靈太上皓凶長盧巨獸手把帝鐘素裊三神戚劒神王衛法辟邪之道也脾神還歸是胃家脾神名常在字魂停脾磨食消胃家之事也中黃經云胃為太倉太倉脾府也耽養靈根不復枯脾為黃庭人命之根本心專養之延年神仙也閉塞命門保玉都元陽子曰命門者下丹田精氣出入神之處也養童下籥護其主主身也身為玉都神聚其所猶都邑也萬神方胙壽有餘胙報也萬神以養見報故壽餘也是謂脾建在中宫脾王中宫土德五臟六腑神明王以脾為主上合天門入明堂存五臟六腑之氣上合天門天門在兩眉間即天庭是也眉間入一寸為明堂守雌存雄傾三光老子一云知其雄守其雌雌牝柔弱也三光日月星也外方內圓神在中外方內圓明堂之象通利血脉五臟豐神恬心靜骨青筋赤髓如霜百脉九竅皆悉真正脾敕七竅去不祥脾磨食消耳聰目明日月列布設陰陽日陽月隂日男月女兩神相會化玉漿男女陰陽自然之津液也淡然無味天人糧神雖合會當味無味子丹進饌肴正黃饌氣也子丹真人進丹田之真氣脾為中黃脾磨食消也乃曰琅膏及玉霜津液精氣之色象也太上隱環八素瓊謂絳宫重樓十二環即喉嚨也中有八素之瓊液也溉益八液腎受精咽液流下入腎宫化為玉精也伏於太隂見我形太隂洞房為覩瓊液之形象也揚風三玄出始青青楊風感而化也隂陽二氣與和氣為三三生萬物生物微妙故曰三玄出始青言萬物生而色青也太平經曰積精成青也恍惚之間至清靈隂陽生氣至微至妙戲於飚臺見赤生調暢之氣化為赤子赤子真人也飆臺闃風臺神仙之遊集也逸域熙真餋華榮物外真氣自然養生內盼沉默鍊五形內觀形體神氣長存三氣徘徊得神明三丹田之氣也隱龍遁芝雲琅英仙經云肝膽為青龍故曰隱龍五臟九孔八脉為內芝故曰遁芝雲琅英脾氣之津液可以充飢使萬靈服氣道成役使鬼神上蓋玄玄下虎章神仙之服御也元録經云仙人有玄羽之蓋神虎玉章也沐浴章第三十六沐浴盛潔素肥薰盛古淨字肥無肉薰五辛入室東向誦玉篇太帝在東故也約得萬遍義自鮮不出身中散髮無欲以長存仙經服九霞必先散髮天胎息法仰卧散髮令挑髙二寸五分屈兩手大毋指握固閉目申兩臂去身五寸乃漱滿口中津液咽之滿三徐徐以鼻內氣氣入五六息則吐之一呼一吸為一息至十吐氣可少頻申訖復為之滿四九為一竟矣尋觀文意此散髮非尊此道也蓋散髮無為自得之意無外情欲而已五味皆至正氣還合五為一自然之道夷心寂悶勿煩冤悶靜也寂默清靜道經云其政悶悶其民淳淳過數巳畢體神精專精所致黃華玉女告子清丹田隂神與巳言也真人既至使六丁真人指學者身也至謂精至六丁如上說者也即授隱芝大洞經隱芝謂隱道也以仙人喻芝英十讀四拜朝太上玉精真訣田東華玉篇者必十讀四拜玉篇謂此文先謁太帝後北向太帝在東七元居北故也黃庭內經玉書暢仙道成矣授者曰師受者盟斯文可重故以為盟雲錦鳳羅金鈕纏信誓之物以代割髮肌膚全契誠不假出血斷髮携子登山歃液丹受行黃庭道者必重盟而後傳金書玉景乃可宜信洽方授傳得可授告三宫三官天也水也勿令七祖受冥患傳非其人殃及先世患讀為還也太上微言致神仙可尊可貴不死之道此真文一心散重奉而行之黃庭內景玉經注卷下終
