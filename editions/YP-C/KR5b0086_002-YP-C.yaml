seq: 2
body:
  text: 而昇九天九天者謂九氣靑天其氣主生者也脾部章第十三脾部之宮屬戊己土宮也戊己中央之辰也中有明童黃裳裏明童謂魂停黃裳土之色消穀散氣攝牙齒脾爲五臟之樞脾磨食消性氣乃全齒爲羅千故攝牙齒是爲太倉兩明童太倉脾府此明童謂脾神神名混康坐在金臺城九重注念存思神狀當然方圓一寸命門中卽黃庭之中丹田之所也主調百穀五味香口中滋味脾磨之所致也辟卻虛羸無病傷內指事也食消故也外應尺宅氣色芳尺宅面也飢飽虛羸形乎面色光華所生以表明示知虛實黃錦玉衣帶虎章脾主中黃謂黃庭眞人服錦衣也玉淸隱書云太上道君佩神虎大章也注念三老子輕翔三老謂元老玄老黃老之君也念脾中眞人自然變化子謂受黃庭之學長生高仙遠死殃莊子曰方生方死方死方生方可方不可方不可方可以此而談其理均也故長生者不死寂滅者不生不死不生則眞長生不生不死則眞寂滅何死殃之所及也膽部章第十四膽部之宮六腑精膽胃大腸小腸膀胱三焦爲六腑也太平經云積精成靑故膽爲六腑之精也中有童子曜威明文云膽神龍曜字威明勇捍之義也雷電八振揚玉旌八方雷震有威怒之象也玉旌剛氣之色也龍旂橫天擲火鈴膽靑龍之色旌旂威戰之具也火鈴者膽邊肉珠之象也怒則奮張故言擲也主諸氣力攝虎兵膽力互用主於捍難故攝虎兵外應眼童鼻柱間內指事也心之喜怒形於眉目之間腦髮相扶亦俱鮮人之震怒髮上衝冠九色錦衣綠華裙靑錦東方九氣之色也綠華裙膽膜之象佩金帶玉龍虎文膽神威明之服飾也能存威明乘慶雲內象喻也思存膽神不倦則仙道可致也役使萬神朝三元三元道君各處三淸之上諸天神仙并朝宗之致也脾長章第十五脾長一尺掩太倉太倉胃也中黃經云胃爲太倉君元陽子曰脾正橫在胃上也中部老君治明堂脾黃庭之宮也黃老君之所治上應明堂眉間入一寸是也厥字靈元名混康脾磨食消內外相應大腸爲胃之子混元而受納之康安治人百病消穀糧胃管榮華則無疾傷黃衣紫帶龍虎章脾居胃上故曰黃衣也紫帶龍虎章胃絡之象長精益命賴君王太倉混康爲君爲王三呼我名神自通思胃腑之神則心虛洞鑒也三老同坐各有朋上元老君居上黃庭宮與泥丸君蒼華君靑城君及明堂中君居洞房中父母及天庭眞人等共爲朋又中玄老君居中黃庭宮與赤城童子丹田君皓華君含明君英玄君丹元眞人等爲朋也下黃老君居下黃庭宮與太一君魂停君靈元君太倉君丹田眞人等爲朋也常存三老和合百神流通部位營衞無有差失也或精或胎别執方玉厯經云下丹田者人命之根本精神之所藏五氣之元也在臍下三寸附著脊號爲赤子府男子以藏精女人以藏胎主和合赤子陰陽之門戸也其丹田中氣左靑右黃上白下黑桃孩合延生華芒桃孩陰陽神名亦曰伯桃仙經曰命門臍宮中有大君名桃孩字合延衣朱衣紫芙蓉冠暮臥存之六甲六丁來侍人也生華芒謂陰陽之氣不衰也男女徊九有桃康男女合會必存三丹田之法桃康丹田下神名主陰陽之事徊三爲九故曰徊九大洞眞經云三元隱化則成三宮三宮中有九神謂上中下三元君太一公子白元無英司命桃康各有宮室故曰有桃康道父道母對相望陰陽兩半成一故曰相望師父師母丹玄鄉道爲宗師陰陽之主也丹玄鄉謂存丹田法也可用存思登虛空學仙之道殊途一會歸要終合三以爲一散一以爲三此道之要也玄妙內篇云兆欲長生三一當明閉塞三關握固停又云口爲天關精神機手爲人關把盛衰足爲地關生命扉又臍下三寸爲關元亦曰三關言固精護氣不妄施泄含漱金醴吞玉英金體玉英口中之津液大洞經云服玄根之法心存胃口有一女子嬰兒形无衣服正立胃管張口承注魂液仰翕五氣當漱滿口中內外津液滿口咽之遣入玄女口中五過畢叩齒三通咽液九過也遂至不死三蟲亡洞神訣云上蟲白而靑中蟲白而黃下蟲白而黑人死三蟲出爲尸鬼各化爲物與形爲殃擊之衝破也其餘眾蟲皆隨尸而亡故學仙者精謹備於五情之氣然後服食藥物以去三蟲又云上尸彭琚使人好滋味嗜慾凝滯中尸彭質使人貪財寶好喜怒下尸彭矯使人愛衣服躭婬女色亦名三毒心意常和致欣昌道通无礙五嶽之雲氣彭亨五臟之氣爲五嶽之雲彭亨流通无擁之稱也保灌玉廬以自償玉廬鼻廬也言三蟲旣亡眞氣和洽出入玄牝綿綿不絶故曰自償五形完堅無災殃五體五臟自然相應故也上覩章第十六上覩三元如連珠三元謂三光之元日月星也非指上中下之三元也落落明景照九隅三光在上而下燭九隅九隅九方也言常存日月洞照一身也五靈夜燭煥八區五靈謂五星也炳煥羅列一身常能存之則與天同休也子存內皇與我遊大道無心有感則應身披鳳衣御虎符仙官之服御者一至不久昇虛无一者無二之稱也學道專一與虛同體則神仙可到也莊子云人能知一萬事畢方寸之中念深藏方寸之中謂下關元在臍下三寸方圓一寸男子藏精之所言謹閉藏之不方不圓閉牖窗方靜圓明不動不靜但當杜塞不妄洩也三神還精老方壯還精神於三田則久夀延年也魂魄內守不爭競魂陽魄陰各得其一故易曰一陰一陽之謂道神生腹中御玉璫腹心內明口吐珠玉按五神行事訣云兩眉間直入一寸爲玉璫紫闕竊觀文意未應是此也靈注幽闕那得喪存神守一無橫夭也琳條萬尋可蔭仗外象諭也琳條玉樹萬尋高遠象身形同眞則神明之所庇蔭者也三魂自甯帝書命眞道旣成名書帝籙靈臺章第十七靈臺鬱藹望黃野靈臺心也謂心專一存見黃庭黃庭卽黃野也三寸異室有上下三丹田上中下三處各異每室方圓一寸故云三寸今人猶謂心爲方寸卽一所間關營衞高玄受三田之間各有間關營衞分部至高至玄心當受以存念之也洞房紫極靈明戸大洞經云兩眉間直上卻入三分爲守寸雙田入骨際三分有童闕明堂正深七分左爲靑房右爲紫戸卻入一寸爲明堂宮左有明童眞君右有明女眞官中有明鏡神君卻入二寸爲洞房左有無英君右有白元君中有黃老君卻入三寸爲丹田宮亦名泥丸宮左有上元赤子右有帝卿君卻入四寸爲流珠宮有流珠眞神居之卻入五寸爲玉帝宮有上淸神母居之其明堂上一寸爲天庭宮上淸眞女居之洞房上一寸爲極眞宮太極帝妃居之丹田上一寸爲玄丹宮中黃太一眞君居之流珠上一寸爲太皇宮太上眞君居之故曰靈門戸也是昔太上告我者我者扶桑太帝君自謂也言我道成承昔道君授以黃庭之術也言此道不遠止下丹田故卽言是昔也左神公子發神語據太洞經左有无英此云公子亦互言耳發神語者用心專一則教之以道右有白元併立處右爲學道者之侍明堂金匱玉房間皆上元之宮釋如下說也上淸眞人當吾前上元部神想在天庭之際黃裳子丹氣頻煩謂中元童子處於赤城頻煩氣盛不衰竭借問何在兩眉端明堂之前內俠日月列宿陳五辰行事訣云太上眞人招五辰於洞房南極元君受傳每夜半坐臥心存西方太白星在兩眉間直上一寸入一寸爲玉璫紫闕左日右月又次存北方辰星在帝鄉玄宮在髮際下五分直入一寸也又次存東方嵗星在洞闕朱臺洞闕朱臺在目後一寸直入一寸是也又次存南方熒惑星在玉門華房玉門華房在兩目㫮際直入五分是也又次存中央鎭星在金匱黃室長谷黃室長谷在人中直入二分是也存之綴懸於上畢叩齒五通咽液二十五過微咒曰高元紫闕中有五神寶曜敷暉放光衝門精氣積生化爲老人首巾素容綠帔綘裙右帶流鈴左佩虎眞手把天剛散綘飛晨足躡華蓋吐芒鍊身三景保守令我得眞養魂制魄乘飈飛仙是其事也內象諭七曜九元冠生門七曜七星配人之七竅九元九辰配人之九竅廢一不可故曰生門三關章第十八三關之內精氣深謂關元之中男子藏精之所也又據下文口手足爲三關又元陽子以明堂洞房丹田爲三關並可以義取而存也九微之中幽且陰上淸大洞經云三元隱化則成三宮是名太淸太素太和三三如九故有三丹田又有三洞房合上三元爲九宮九宮中精微故曰九微言幽玄而不可見也口爲天關精神機言發於情猶樞機也足爲地關生命棐言運用己身而生也棐或爲扉手爲人關把盛衰縱捨由己若得章第十九若得三宮存玄丹三丹田之宮故曰三宮玄丹丹元謂心也存思在心故偏指一所也太一流珠安崑崙太一流珠謂心精洞神經云頭爲三台君又爲崑崙指上丹田也又云臍爲太一君亦爲崑崙指下丹田也言心存三田諸神皎然在目前本經曰子欲不死修崑崙山名也重重樓閣十二環謂喉嚨十二環相重在心上心爲綘宮有象樓閣者也自高自下皆眞人高下三田十二樓閣皆有眞神有如上說玉堂綘宇盡玄宮綘宮明堂上下相應皆宮室也璇璣玉衡色蘭玕喉骨環圓動轉之象也蘭玕其色也瞻望童子坐槃桓存見赤城童子子丹眞人坐言其神安靜問誰家子在我身言已有之此人何去入泥丸與上元諸神上下相應洞神經云腦爲泥丸宮千千百百自相連神本出於一一生二二生三三生萬物變化不離身心一一十十似重山存見萬神重疊安坐山象坐形雲儀玉華俠耳門雲儀玉華鬢髮之號言耳居其間經曰鬢神名蒼華凡言華者敷榮之義猶草木之花赤帝黃老與我魂赤帝南方之帝君也黃老者中黃老君也魂爲陽神魄爲陰神陰陽相應故言與我魂太微靈書云人有三魂一曰爽靈二曰胎光三曰幽精常呼念其名則魂不離人身也三眞扶胥共房津魂與赤帝黃老爲三眞言相應扶胥同津共氣者也五斗煥明是七元五斗星北斗又靈寶經有五方之斗亦爲五斗洞房訣云存九元七元者眠起初卧及食畢微呪曰五星開道六合紫房廻元隱遁豁落七辰生魂者玄父變一成神生魄者玄母化二生身攝吾筋骨者公子爲吾精氣者白元長生久視飛仙十天日月飛行六合間天地內爲六合存念身中日月星辰森羅萬象亦如天地之間了了然也帝鄉天中地戸端眉上髮際五分直入一寸亦爲帝鄕又明堂上一寸爲天庭天庭卽天中也又鼻爲上部之地戸心存日月星辰等諸神皆當在其端端謂之鼻上髮際之下面部魂神皆相存內外心神自相應也呼吸章第二十呼吸元氣以求仙採飛根採玄暉吞五牙挹九霞服食胎息之道皆謂天地陰陽四時五行之氣仙公公子已可前此洞房訣也洞房宮左爲無英君一名公子仙公直指黃庭學者言學黃庭仙公復行洞房之訣而存見公子故言在前朱鳥吐縮白石源朱鳥舌象白石齒象吐縮導引津液謂陰陽之氣流通不絕故曰源結精育胞化生身本已之所從來留胎止精可長生眞誥曰上淸眞人口訣夫學仙之人安心養神服食治病使腦宮塡滿玄精不傾然後可以存神服氣呼吸二景若數行交接漏泄施瀉者則氣穢神亡精靈枯竭雖復玄挺玉籙金書太極者將亦何解於長生乎在昔先師常戒於斯事云學生之人一交接則傾一年之藥勢二交接則傾二年之藥勢過此以往則不止之藥都傾於身是以眞仙常愼於此以爲生生之大忌也三氣右徊九道明三氣謂三丹田之氣右徊言周流順序調和陰陽則四關九竅通流朗徹而無病也正一含華乃充盈存正守一神氣華榮故能充滿六合乘物而變遙望一心如羅星存見赤城童子居在城中如星之映羅縠金室之下不可傾謂心居肺下肺主金其色白故曰金室常能存之長生不死也延我白首反孩嬰內指事也謂童顏不老也瓊室章第二十一瓊室之中八素集謂上元淸眞瓊室體骨之象也泥丸夫人當中立經云洞房中有父母母卽夫人也亦名道母泥丸洞房上已釋長谷玄鄉繞郊邑長谷鼻也玄鄉腎也郊邑謂五臟六腑也言鼻中之氣出入下與腎連周繞臟腑心居赤城存想內外郭外曰郊故爲象諭也六龍散飛難分別言六腑之氣微妙潛通難可分別當審存之也長生至愼房中急氣亡液漏體腦枯竭雖益以畎澮而泄以尾閭不可不愼也何爲死作令神泣房中不愼傷精失明故神泣也忽之禍鄉三靈没禍鄉死地三靈三魂也謂爽靈胎光幽精殁亡者也但當吸氣錄子精呼吸吐納閉房止精寸田尺宅可治生謂三丹田之宅各方一寸故曰寸田依存丹田之法以理生也經云寸田尺宅彼尺宅謂面也若當決海百漬傾謂房中淫泄不知閉止也葉去樹枯失靑靑象人死無生氣氣亡液漏非已形仙經云閉房鍊流不多言不遠唾反是亡矣專閉御景乃長甯專閉情欲存服日光老子曰善閉者無關楗而不可開又上淸紫文靈書有採飛根之法常以日初出東向叩齒九通畢陰咒曰魂名曰中五帝字曰魂珠景照韜綠映廻霞赤童玄炎飈象祝呼此十六字畢冥目握固存五色流霞來接一身於是日光流霞俱入口中名曰日華飛根玉胞玉胞水母也向日吞霞四十五咽畢又咽液九過也保我泥丸三奇靈泥丸上丹田也大洞經云三元隱化則成三宮一曰太淸之中三君二曰三丹田之神三曰符籍之神故曰三奇靈也恬淡閉視內自明謂存思三丹田之法一如上說物物不干泰而平行道眞正邪物不干慤矣匪事老復丁猛獸不據攫鳥不搏老者反壯病者皆强慤矣必然思詠玉書入上淸精研內景必獲仙道常念章第二十二常念三房相通達三房謂明堂洞房丹田之房也與流珠玉帝天庭極眞玄丹泥丸太皇等諸宮左右上下皆相通達洞得視見無內外存思丹田三三如九合爲一明朗洞徹無有內外也存漱五牙不飢渴靈寶有服御五牙之法五牙者五行之生氣以配五臟元精經云常以立春之日雞鳴時入室東向禮九拜平坐叩齒九通思存東方安寶華林靑靈始老帝君九千萬人下降室內鬱鬱如雲以復已形從口中入直下肝腑祝曰九氣靑天元始上精皇老尊神衣服羽靑役御天官煥明嵗星散耀流芳淘漑我形上食朝霞服引木精固養靑牙保鎭朽零肝腑充盈玉芝自生延年駐夀色反童嬰五氣混合天地長并畢引靑氣九咽止便服東方赤書玉文十二字也餘南方西方北方中央依按靈寶服御五牙之法而行之神華執巾六丁謁神華者玉厯經云太陰玄光玉女道之母也衣五色朱衣在脾腑之上黃雲華蓋之下六丁者謂六丁陰神玉女也老君六甲符圖云丁卯神司馬卿玉女足曰之丁丑神趙子玉玉女順氣丁亥神張文通玉女曹漂之丁酉神藏文公玉女得喜丁未神石叔通玉女寄防丁巳神崔巨卿玉女開心之言服鍊飛根存漱五牙之道成則役使六丁之神急守精室勿妄泄精室謂三丹田上下資連而不絕制之在心心卽中丹田也緩急之所由眞妄之根本也閉而寶之可長活積精之所致也起自形中初不闊調心使氣微妙無形三宮近在易隱括謂三丹田眞官近在人身隱括精氣常以心爲君主者也虛无寂寂空中素外指事也素有二說使形如是不當汙使形輕淨如懸縑素於空中也又云身中空虛使如器之漆素虛靜當然汙謂有其事也九室正虛神明舍九室謂頭中九宮之室及人之九竅使上宮榮華九竅眞正則眾神之所止舍也洞神經云天有九星兩星隱故稱九天地有九宮故稱九地人有九竅故稱九生言人所由而生也存思百念視節度存念身中百神呼吸上下一如科法又云千千百百似重山皆神象六府修治勿令故按洞神經云六府者謂肺爲玉堂宮尙書府心爲綘宮元陽府肝爲淸冷宮蘭臺府膽爲紫微宮無極府腎爲幽昌宮太和府脾爲中黃宮太素府異於常六府也行自翶翔入天路謂升仙羽化也治生章第二十三治生之道了不煩無爲淸簡約以守志但修洞玄與玉篇洞玄謂洞玄靈寶玉篇眞文黃庭也兼行形中八景神玉緯經云五臟有八卦天神宿衞太一入使者主八節日八卦合太一爲九宮八卦外有十二樓樓謂喉嚨也臍中爲太一君主人之命也一名太極一名太淵一名崑崙一名持軀主身中萬二千神也二十四眞出自然天有二十四眞氣人身亦有之又三丹田之所三八二十四眞人皆自然之道炁也高拱無爲魂魄安行忘坐忘離行去智淸靜神見與我言能淸能靜則心神自見幾覽無外而與已言卽謂黃庭眞人安在紫房幃幙間紫房幃幙一名綘宮謂赤城中章子所安之處存思心神其狀如此立坐室外三五玄謂八景及二十四眞神營護入身則三田五藏眞氣調柔無災病也燒香按手玉華前玉華卽華蓋之前謂眉間天庭也百神之宗元眞人之窟宅當仰面而存之也共入太室璇璣門洞房經云天有太室玉房雲庭雲庭中央黃老君之所居也玉房一名紫房一名綘宮通名明堂上有華蓋東西宮洞通左右黃庭之內人身具有之如上文說璇璣中樞名高研恬淡道之園研精恬淡眞氣來遊內視宻眄盡覩眞入盡思存百神森森眞人在已莫問隣玉厯經云老子者天地之魂自然之君常侍道君在左右人身備有之何處遠索求因緣老子曰大道汛兮其可左右言不遠也
