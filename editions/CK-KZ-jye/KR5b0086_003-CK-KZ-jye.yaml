body:
  text: 隱景藏形與世殊學仙之士含光藏輝滅跡匿端含氣養精口如朱肌膚若水雪綽約若處子帶執性命守虛无虛靜恬淡寂寞無爲名入上淸死錄除得補眞人列象玄名三神之樂由隱居理身無爲則神樂理國無事則人安三神三丹田之神也倐歘遊遨無遺憂倏歘疾發也下文云駕歘接生宴東蒙或云倐歘龍名也无遺憂謂懸解羽服一整八風驅八風八方之風先驅掃路也羽服仙服按上淸寶文仙人有五色羽衣又飛行羽經云太一眞人衣九色飛雲羽章皆神仙之服也控駕三素乘晨霞外指事也三雲九霞神仙之所御也金輦正立從玉輿元錄經云上淸九天玄神八聖驂駕九鳳龍車玉輿金輦皆仙人之服器何不登山誦我書書卽黃庭經也鬱鬱窈窈眞人墟山中幽邃入山何難故躊躇情志不決人間紛紛臭如帑疾人間世不可居帤幣惡之帛也五行相推反歸一五行謂水火金木土相推者水生木木生火火生土土生金金生水水又生木周而復始又相刻法水刻火火刻金金刻木木刻土土刻水水刻火周而復始相推之道也反歸一者水數也五行之首萬物之宗老子云道生一一生二二生三三生萬物又易有太極是生兩儀太極者一也兩儀天地天地生萬物萬物又終而歸一一者無二之稱萬物之所成終故云歸一三五氣合九九節妙眞經云三者在天爲日月星名曰三光在地爲珠玉金名曰三寶在人爲耳鼻口名曰三生天地人凡三而各懷五故曰三五其常精也合三三者爲九宮夫三五所懷順眾類也調和萬物理化陰陽覆載天地光明四海風雨雷電春秋冬夏寒暑温涼淸濁之氣諸生之物不得三五不立也故曰天道不遠三五復返三五者天地之樞帶六合之要會九宮之氣節九九八十一爲一章云云可用隱地迴八術九官中有隱遁變化之法太上八素奔晨隱書是曰八術又太微八錄術云太微中有三君一曰太皇君二曰天皇君三曰黃老君三元之氣混成之精出入上淸太素之宮能存思之必得長生伏牛幽闕羅品列伏牛腎之象腎爲幽闕中黃經云左腎爲玄妙君右腎爲玄元君羅品列存思見之三明出華生死際天三明日月星人三明耳目口地三明文章華是生死之際際音節也洞房靈象斗日月存三光於洞房洞房明堂已釋於上者也父曰泥丸母雌一明堂中有君臣洞房中有夫婦丹田中有父母泥丸腦神名老子云知其雄守其雌雌無爲一也三光煥照入子室明白四達能存玄眞萬事畢莊子曰通於一萬事畢也一身精神不可失常存念之不舍須臾高奔日月吾上道吾道君也上淸紫文吞日氣法一名赤丹金精石景水母玉胞經其法常以日初出時東向叩齒九通畢微咒曰魂名日中五帝字日魂珠景照韜綠映迴霞赤童玄炎飈象呼此十六字畢冥目握固存五色流霞來接一身於是日光流霞俱入口中又上淸紫書有吞月精之法月初出時西向叩齒十通微咒月魄名月中五夫人字月魄曖蕭芳豔翳寥婉虛靈蘭鬱華結翹湻金淸瑩炅容臺標咒呼此二十四字畢冥目握固存月中五色精光俱入口中又於光中有黃氣大如目童名曰飛黃月華玉胞之精也能修此道則奔日月而神仙矣鬱儀結璘善相保鬱儀奔日之仙結璘奔月之仙同聲相應同氣相求故二仙來相保持也乃見玉淸虛无老昇三淸之上與道合同也可以迴顏塡血腦魂魄反嬰得成眞人口銜靈芒携五皇口吐五色雲氣光芒四照與五皇老君同遊六合也腰帶虎籙佩金璫仙人之服也九眞經云中央黃老君腰佩龍玄神虎符帶流金之鈴執紫毛之節佩符籙駕歘接生冥東䝉歘倐歘言乘風氣忽發而往或云歘倐龍名也東䝉東海仙境之山也接生之方與生氣相接連歘然而遊其處玄元上一魂魄鍊資一以鍊神神鍊以合一一之爲物叵卒見一者無二之稱也心恬淡以得之知得之而不可見須得至眞始顧眄守眞志滿一自歸已至忌死氣諸穢賤凡飛丹鍊藥服氣吞霞等事皆忌見死屍殗穢之事此衞生家之共忌也然至道冲虛本無淨穢未獲眞正則淨穢有殊殊而不齊則是非起於內生死見於外則淸淨者生之徒濁穢者死之徒故爲養生之所忌也六神合集虛中宴六甲六丁六府等諸神俱在身中身中虛空則宴然而安樂不則憂泣矣結珠固精養神根結珠謂咽液先後相次如結珠固精不妄洩神根形軀也夫神之於身猶國之有君君之有人人以君爲命君以人爲本互相資藉以爲生主而調養之也玉𥫽金籥常完堅老子云善閉者无關楗不可開籥鎖籥𥫽或爲匙也閉口屈舌食胎津屈舌導津液食津而胎仙故曰胎津使我遂鍊獲飛仙積功勤誠之所致也仙人道士非有神修學以得之也積精累氣以爲眞有本或無此句遂闕注黃童妙音難可聞黃童黃庭眞人一名赤城童子妙音謂黃庭道之妙音也玉書綘簡赤丹文黃庭經一名太帝金書一名東華玉篇也字曰眞人巾金巾眞人卽黃童也金色白在西方主肺肺白在心上故曰巾九眞經曰靑帝衣靑玉錦衣帔蒼華飛裙建扶芝丹冠巾金巾又元陽子曰眞人憑午倨子履卯戴酉酉者金負甲持符開七門老子六甲三部符云甲子神王文卿甲戌神辰子江甲申神扈文長甲午神衞上卿甲辰神孟非卿甲寅神明文章存六甲神名則七竅開通无諸疾病火兵符圖備靈關赤章斬邪籙皆役使三五火兵又衞靈神咒曰南方丹天三炁流光熒星轉燭洞照太陽上有赤精開明靈童總御火兵備守三宮卽火兵三五家事也符者八素六神陽精玉胎鍊仙陰精飛景黃華中景內化洞神鑒乾等諸符也圖謂太一混合三五圖六甲上下陰陽圖六甲玉女通靈圖太一眞人圖東井沐浴圖老子內視圖西昇八史圖九變含景圖赤界等諸圖可以守備靈關靈關卽三關四關等身中具有之前昂後卑高下陳列位之形象也執劒百丈舞靈幡神兵幡劒之狀十絶盤空扇紛紜空中作氣煒曄揮霍火鈴冠霄隊落煙金精火鈴冠徹霄漢部伍隊陣狀如落煙屯雲之勢安在黃闕兩眉間存思火兵氣狀俱在天庭天庭一名黃闕兩眉間是此非枝葉實是根學仙之本紫淸上皇大道君亦名玉晨君也太玄太和俠侍端太玄太和眞仙之嘉號也化生萬物使我仙道氣之功勣也飛昇十天駕玉輪乘歘而往晝夜七日思勿眠至誠則感子能行此可長存延年神仙之道積功成鍊非自然學以致其道也是由精誠亦由專守一如初成道有餘內守堅固眞之眞不失節度也虛中恬淡自致神神以虛受百穀之實土地精草實曰穀陰之類也五味外美邪魔腥非淸虛之眞氣臭亂神明胎氣零胎氣謂無味之味自然之正氣也服氣有胎息之法零猶失也那從反老得還嬰言不可得髮白反黑齒落更生此一句應在自存神之下超此不類者三魂忽忽魄糜傾忽忽不恬淡糜傾朽敗也何不食氣太和精進勸服鍊之道故能不死入黃甯黃甯黃庭之道成也心典一體五臟王神以虛受心爲栖神之宅故爲王也動靜念之道德行謂念丹元童子也夫念爲有忘爲無念則易心而後語忘則灰心而神全故道德行淸潔善氣自明光常念之故坐起吾俱共棟梁神以身爲屋宅故云共棟梁吾丹元子也晝日曜景暮閉藏莊子云其覺也形開其寐也魂交交閉也通利華精調陰陽謂心神用捨與目相應華精目精也心開則目開心閉則目閉晝陽而暮陰故云調陰陽經厯六合隱卯酉舉心之用捨陰陽之所由也晝爲經厯暮爲隱藏六合天地內上下四方卯酉也北爲暮幽隱屬也兩腎之神主延夀腎神玄冥字育嬰配屬北方主暮夜人能上精則長夀河上公曰腎藏精轉降適斗藏初九九陽數也斗北辰也北辰主陰謂陽氣下與陰合易曰乾吉在無首無首藏也知雄守雌可無老守雌則藏九之義也知白見黑急坐守老子云知其雄守其雌知其白守其黑皆藏九之義也肝氣鬱勃淸且長肝位東方東方木主春生氣之本也淸長氣色之象羅列六府生三光存想生氣徧照五臟六腑如日月星辰光曜明朗也心精意專內不傾能之一也上合三焦下玉漿言肝氣上則與三焦氣合下則爲口中之液亦猶陰氣上則爲雲下則爲雨雨潤萬物玉漿潤百骸九竅也玄液雲行去臭香眞氣周流則無災病矣治蕩髮齒鍊五方雲行雨施無所不通五方五臟也取津玄膺入明堂咽液之道必自玄膺下入喉嚨喉嚨一名重樓重樓之下爲明堂明堂之下爲洞房洞房之下爲丹田此中部下漑喉嚨神明通身命以津氣爲主也坐侍華蓋遊貴京華蓋肺也肝在肺之下貴京丹田也飄颻三帝席淸涼三帝三丹田中之道君也亦名眞人言肝氣飄颻周流三丹田之所也肝氣爲目精故言席淸涼五色雲氣紛靑葱肝氣與五臟相雜上爲五色雲也閉目內眄自相望常存念之五臟自見矣使心諸神還相崇赤城童子與五臟眞人合契同符共相尊敬也七玄英華開命門七竅流通无留滯也通利天道存玄根身爲根本也百二十年猶可還當急修行時不可失過此守道誠獨難去死近矣唯待九轉八瓊丹九轉神丹白日昇天抱朴子九丹論云考覽養生之書鳩集久視之方曾所披涉篇已千計矣莫不以還丹金液爲大要焉又黃帝九鼎神丹經云帝服之而昇仙與天地相畢乘雲駕龍出入大淸八瓊丹砂雄黃雌黃空靑硫黃雲母戎鹽消石等物是也要復精思存七元雖服神丹兼習黃庭之道七元者謂七星及七竅之眞神也又五帝元君及白元無英君亦爲七元道君洞房訣云存七元者其咒曰迴元隱遁豁落七辰乃七元也日月之華救老殘左目爲日右目爲月目主肝配東方木行也木位春春爲生氣故云救老殘肝氣周流終無端莊子曰指窮爲薪而火傳生得納養而命續也肺之爲炁三焦起中黃經曰肺首爲三焦肺之爲氣謂氣嗽氣嗽起自三焦故言三焦起說三焦者多未的其實今以爲五臟之上係管爲三焦焦者熱也言肝心肺頭焦熱之義也視聽幽冥候童子童子心神赤城中者元陽子曰闚離而下存童子童子是目童也謂人欲知死生當以手指柱目眥候其目光有光則生無光則死也調理五華精髮齒五華五臟之氣仙經曰髮欲數櫛齒欲數叩也三十六咽玉池裏口爲玉池亦曰華池膽爲中池胞爲玉泉華池咽液入丹田所謂漑灌靈根也開通百脉血液始身中血液以口爲本始也顏色生光金玉澤百節開通齒堅髮黑不知白反老還嬰存此眞神勿落落專誠不墮常憶此宮有座席此宮謂肺宮也座席神之所安中黃經云肺首爲三焦玄老君之所居也眾神合會轉相索眾眞同聚慮有邪精隱藏羽蓋看天舍此明脾宮之事脾爲丹田黃庭中央戊己土行也上觀肝肺如蓋如舍也朝拜太陽樂相呼謂魂神與眾仙合會也素靈經云太上神仙有太陽君少陽君太虛君浩素君羣仙宗道之遊樂也明神八威正辟邪八威八靈神也眞誥云北帝殺鬼咒曰七正八靈太上皓兇長盧巨獸手把帝鐘素梟三神威劒神王衞法辟邪之道也脾神還歸是胃家脾神名常在字魂停脾磨食消胃家之事也中黃經云胃爲太倉太倉脾府也耽養靈根不復枯脾爲黃庭人命之根本心專養之延年神仙也閉塞命門保玉都元陽子曰命門者下丹田精氣出入神之處也養童下籥護其主主身也身爲玉都神聚其所猶都邑也萬神方胙夀有餘胙報也萬神以養見報故夀餘也是謂脾建在中宮脾王中宮土德五臟六腑神明王以脾爲主上合天門入明堂存五臟六腑之氣上合天門天門在兩眉間卽天庭是也眉間入一寸爲明堂守雌存雄傾三光老子云知其雄守其雌雌牝柔弱也三光日月星也外方內圓神在中外方內圓明堂之象通利血脉五臟豐神恬心靜骨靑筋赤髓如霜百脉九竅皆悉眞正脾救七竅去不祥脾磨食消耳聰目明日月列布設陰陽日陽月陰日男月女兩神相會化玉漿男女陰陽自然之津液也淡然無味天人糧神雖合會當味無味子丹進饌肴正黃饌氣也子丹眞人進丹田之眞氣脾爲中黃脾磨食消也乃曰琅膏及玉霜津液精氣之色象也太上隱環八素瓊謂綘宮重樓十二環卽喉嚨也中有八素之瓊液也漑益入液腎受精咽液流下入腎宮化爲玉精也伏於太陰見我形太陰洞房爲覩瓊液之形象也揚風三玄出始靑靑楊風感而化也陰陽二氣與和氣爲三三生萬物生物微妙故曰三玄出始靑言萬物生而色靑也太平經曰積精成靑也恍惚之間至淸靈陰陽生氣至微至妙戲於飚臺見赤生調暢之氣化爲赤子赤子眞人也飈臺閬風臺神仙之遊集也逸域熙眞養華榮物外眞氣自然養生內盼沉默鍊五形內觀形體神氣長存三氣徘徊得神明三丹田之氣也隱龍遁芝雲琅英仙經云肝膽爲靑龍故曰隱龍五臟九孔八脉爲內芝故曰遁芝雲琅英脾氣之津液可以充飢使萬靈服氣道成役使鬼神上蓋玄玄下虎章神仙之服御也元錄經云仙人有玄羽之蓋神虎玉章也沐浴盛潔棄肥薰盛古淨字肥魚肉薰五辛入室東向誦玉篇太帝在東故也約得萬徧義自鮮不出身中散髮無欲以長存仙經服九霞必先散髮又胎息法仰臥散髮令枕高二寸五分屈兩手大母指握固閉目申兩臂去身五寸乃漱滿口中津液咽之滿三徐徐以鼻內氣氣入五六息則吐之一呼一吸爲一息至十吐氣可少頻申訖復爲之滿四九爲一竟矣尋觀文意此散髮非專此道也蓋散髮無爲自得之意无外情欲而已五味皆至正氣還合五爲一自然之道夷心寂悶勿煩寃悶靜也寂默淸靜道經云其政悶悶其民湻湻過數已畢體神精專精所致黃華玉女告子情丹田陰神與已言也眞人旣至使六丁眞人指學者身也至謂精至六丁如上說者也卽授隱芝大洞經隱芝謂隱者也以仙人喻芝英十讀四拜朝太上玉精眞訣曰東華玉篇者必十讀四拜玉篇謂此文先謁太帝後北向太帝在東七元居北故也黃庭內經玉書暢仙道成矣授者曰師受者盟斯文可重故以爲盟雲錦鳳羅金鈕纏信誓之物以代割髮飢膚全契誠不假出血斷髮携手登山歃液丹受行黃庭道者必重盟而後傳金書玉景乃可宣信洽方授傳得可授告三官三官天地水也勿令七祖受冥患傳非其人殃及先世患讀爲遷也太上微言致神仙可尊可貴不死之道此眞文一心敬重奉而行之
