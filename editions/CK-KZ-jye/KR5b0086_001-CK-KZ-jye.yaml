front:
  text: 重刋道藏輯要梁邱子註
  hash: sha256:f453ef539b801103c12eaaf3568c6a01961285c98b5fea0017ef2c5430aaee20
  markers:
  - {type: head, offset: 6, content: 太上黃庭內景玉經, id: KR5b0086_CK-KZ-jye_001-h1, level: 1}
body:
  text: 上淸紫霞虛皇前三淸之境有玉淸上淸太淸此三淸之中一切大聖之所居也按玉緯經云上淸者虛皇大道君之所治也卽大道之域包羅三淸又常朝儀西南方有太靈虛皇天尊卽元始之本號也道君欲明作七言之所始乎紫霞之宮也亦名紫瓊宮亦曰紫晨之宮太上大道玉晨君太上尊之號也按本行經有元始五老之君號也玉晨君卽皇老之一號也閑居蘂珠作七言祕要經云仙宮中有寥陽之殿蘂珠之闕七映之房道君在中而說經也人身備有之也散化五形變萬神謂隳支體黜聰明離形去智同於大通先本後跡故假神以託用也夫神者隨感而應者也故有其數豈直萬乎是爲黃庭曰內篇因中而得名也琴心三疊舞胎仙琴和也疉積也存三丹田使和積如一則胎仙可致也胎仙胎息之仙也猶胎在腹中有氣而無息九氣映明出霄間三田之中有九氣炳煥無不燭也大洞經云三丹田及三元三洞房合爲九宮宮中有天皇九魄變爲九氣化爲九神也神蓋童子生紫煙觀照存思假目爲事下文云眉號華蓋覆明珠華蓋卽神蓋謂眉也明珠目童子也紫煙目精妙之氣是曰玉書可精研文因跡始專則能通詠之萬過昇三天精備神充名上三淸千災以消百病痊精神具則災病自消不憚虎狼之凶殘无殘傷也亦以卻老年永延此一章都說黃庭之道也上有魂靈下關元上魂天分也下關地分也魂靈无形關元有質人法天地形象具之一如後說左爲少陽右太陰左東右西卯生酉殺後有宻戸前生門前南後北宻戸後二竅言隱宻也生門前七竅言藉以生也合爲九竅也出日入月呼吸存日月者陰陽之精也左出右入身有陰陽之氣出爲呼氣入爲吸氣呼吸之間心當存之上淸紫文云心存日月坐立任所便是也元氣所合列宿分元氣一也使心與道一合存日月星辰輝光照耀羅列一身分明與天地合也紫煙上下三素雲紫煙是目精之氣存見三丹田中上下俱有白氣白氣流通一體又云目光有紫靑絳三色爲三素雲仙經云雲林夫人咒曰目童三雲兩目眞君灌漑五華植靈根素雲之氣在口爲玉液存咽之以灌五華五華者五臟之英華靈根命根植生七液洞流衝廬間七竅之液上下周流上流曰衝下流曰迴廬額廬之間明堂中迴紫抱黃入丹田內象諭也脾氣黃目氣紫七液周流抱黃迴紫出入呼吸俱入丹田丹田有三所靈命之根也按大洞經云眉間郤入三分爲雙田入骨際三分爲臺闕左爲靑房右爲紫戸二神居之眉間卻入一寸爲明堂宮左明童眞君右明女眞宮中明鏡神君眉間卻入二寸爲洞房左无英君右白元君中央黃老魂眉間卻入三寸爲丹田宮亦名泥丸宮左有上元赤子君右有帝卿君又卻入四寸爲流珠宮有流珠眞神居之又卻入五寸爲玉帝宮有玉淸神母居之又當明堂上一寸爲天庭宮有上淸神女居之又洞房直上一寸爲極眞宮太極帝妃居之又丹田直上一寸爲丹玄宮有中黃太一君居之又流珠直上一寸爲太皇宮太上君居之男爲雄一女爲雌一雄雌二神男女並可兼修之幽室內明照陽門幽隱之室內自思存心目明鑒燎如日月夫神者無方之謂也心識無方存之則有遣之則亡口爲玉池太和官口中津液爲玉液一名醴泉亦名玉漿貯水爲池百節調柔五臟和適皆以口爲官主也一本有作太和宮於文韻不便也大洞經云心存胃口有一女子嬰兒形無衣服正立胃管張口承注魂液仰吸五氣當卽潄滿口中內外津液滿口咽之遣直入玄女口中五過畢叩齒三通微咒曰玉淸高上九天九靈化在玄女下入胃淸金和玉映心開神朗服食日精金華充盈潄咽靈液災不干靈液眞氣邪不干正體生光華氣香蘭不食五穀無穢滓也卻滅百邪玉鍊顏肌膚若霜雪綽約若處子審能修之登廣寒廣寒北方仙宮之名又云山名亦云廣霞洞眞經云冬至之日月伏於廣寒之宮其時育養月魄於廣寒之池天人採靑華之林條以拂日月光也晝夜不寢乃成眞勤修靜定則爲眞人雷鳴電激神泯泯泯泯取平聲讀調神理氣精魄恬愉雖遇震雷而不驚慴又曰雷鳴電激爲叩齒叩齒存思乃是神用不得言泯泯黃庭內人服錦衣黃庭內人謂道母黃庭眞人謂道父人身備有之錦衣具五色也卽謂五臟之眞氣也三庭之中備有之紫華飛裙雲氣羅十方經云高上玉皇衣文明飛雲之裙卽神仙之所服也丹靑綠條翠靈柯五色雜氣共生枝條仙衣之飾七㽔玉籥閉兩扉外象諭也七竅開闔以諭關籥用之以道不妄開也㽔籥之飾也存神必閉目故名曰閉兩扉重扉金關宻樞機金取堅剛也老子云善閉者无關揵而不可開言養生者善守精神不妄洩也玄泉幽闕高崔巍玄泉口中之液也一曰玉泉一名醴泉一名玉液一名玉津一名玉漿兩眉間爲闕庭兩腎間爲幽闕如門之左右象巍中間闕然爲道腎在身中故曰幽闕也據腎在五臟之下而云高者形伏存神卽在丹田之上故言高也三田之中精氣微內指事也丹田之中神氣變化感應從心非有非無不可爲色象從麤入妙必其有係故以氣言之氣以心爲主因主立象至精至微不可數求也道機經云天有三光日月星人有三寶三丹田三丹田中氣左靑右黃上白下黑也嬌女窈窕翳霄暉眞誥云嬌女耳神名言耳聰朗徹明掩玄暉也重堂煥煥明八威重堂喉嚨名也一曰重樓一曰重環本經云綘宮重樓十二級綘宮心也喉嚨在心上故曰重堂喉嚨者津液之路流通上下滋榮一體煥名八方八卦之神曰八威也天庭地關列斧斤兩眉間爲天庭紫微夫人祝曰開通天庭使我長生列斧斤言勇壯靈臺盤固永不衰心爲靈臺言有神靈居之靜則守一動則存神神具體安不衰竭矣中池內神服赤珠膽爲中池舌下爲華池小腹胞爲玉池亦三池之通名膽部曰龍旂橫天擲火鈴赤珠者火鈴之服丹錦雲袍帶虎符丹錦雲袍心肺之色也在膽之上故曰雲袍符命符也九眞經云皇老君佩玄龍神虎符帶流金之鈴並道君之服也橫津三寸靈所居內指事也臍在胞上故曰橫津臍下三寸爲丹田眞人赤子之所居也隱芝翳鬱自相扶謂男女之形體也隱翳交合自然之道按內外神芝訣云五臟之液爲內芝內芝則隱芝也又云隱奥者也天中之岳精謹修天中之岳謂鼻也一名天臺消魔經云鼻欲數按其左右令人氣平所謂漑灌中岳名書帝錄靈宅旣淸玉帝遊面爲靈宅一名尺宅以眉目鼻口之所居故爲宅也修之淸通則神仙矣洞神經曰面爲尺宅字或作赤澤通利道路無終休太素丹景經曰一面之上常欲兩手摩拭之高下隨形不休息則通利耳目鼻口之氣脉眉號華蓋覆明珠明珠目也九幽日月洞空無五辰行事訣云眉上直入一寸爲玉璫紫闕左日右月又玉厯經云太淸上有五色華蓋九重人身亦有之當存目童如日月之明也宅中有眞常衣丹眞謂心神卽赤城童子也亦名眞一亦名赤子亦名子丹亦名眞人心存見之常存目前與心相應衣丹象心氣赤色也審能見之無疾患元陽子曰常存心神則無病也赤珠靈裙華蒨粲玄膺之象色外諭也舌下玄膺生死岸內指事玄膺者通津液之岸也本經云玄膺氣管受精府出淸入玄二氣煥謂吐納陰陽二氣煥然著明也子若遇之昇天漢人能善遇吐納之理則成天仙矣至道不煩决存眞專心則至泥丸百節皆有神神者妙萬物而爲言因象立名則如下說髮神蒼華字太元白與黑謂之蒼最居首上故曰太元腦神精根字泥丸丹田之宮黃庭之舍洞房之主陰陽之根泥丸腦之象也眼神明上字英玄目諭日月在首之上故曰明上英玄童子之精色也內指事也鼻神玉壟字靈堅玉壟之骨象玉也神氣通天出入不竭故曰靈堅耳神空閑字幽田空閑幽靜聽物則審神之所居故曰田也舌神通命字正倫咽液以舌性命得正其五味各有倫理齒神崿鋒字羅千牙齒堅利如劒崿刀鋒摧羅眾物而食之者也一面之神宗泥丸腦中丹田有神之主泥丸九眞皆有房大洞經云三元隱化則成三宮三三如九故有三丹田又有三洞房合上三元爲九宮中有九眞神三九二十七神氣相合人當存之亦謂天皇九魄變成九氣化爲九神各居一洞房方圓一寸處此中房有一寸故腦有瓣也同服紫衣飛羅裳九眞之服皆象氣色飛猶輕也但思一部夀无窮存思九眞不死之道非各別住俱腦中丹田之中眾神所居列位次坐向外方神繞丹田而外其面以扞不祥八素經云眞有九品向外列位則當上眞上向高眞南向太眞東向神眞西向玄眞北向仙眞東北向天眞東南向靈眞西南向至眞西北向夫眞者不視而明不聽而聰不言而正不行而從所存在心自相當心存玄眞內外相應心神丹元字守靈內象諭也心爲臟腑之元南方火之色栖神之宅故曰守靈也肺神皓華字虛成肺爲心之華葢皓白也西方金之色肺色白其質輕虛故曰虛成也肝神龍煙自含明肝位木行東方靑龍之色也於藏主目日出東方木生火故曰含明翳鬱導煙主濁淸翳鬱木象也得火而煙生得陽而氣生淸則目明濁卽目暗有別本無此一句腎神玄冥字育嬰腎屬水故曰玄冥腎精爲子故曰育嬰也脾神常在字魂停脾中央土位也故曰常在卽黃庭之宮也脾磨食消神康力壯故曰魂停膽神龍曜字威明膽色靑黃故曰龍曜主於勇捍故曰威明外取東方靑龍雷震之象者也六府五臟神體精資保一身廢一不可故曰神體精心肝肺腎脾爲五臟膽胃大腸小腸膀胱三焦爲六腑所言腑者猶府邑之府取中受物之義故曰腑也臟者各是一質共藏於身故謂之臟也言三焦者多矣而未的其眞葢心肝肺三臟之上係管之中爲三焦中黃經云肺首爲三焦當指其所也又據五方之色脾爲中黃應爲五臟之主而今共以心爲主者何也答曰心居臟中其質虛受也夫虛無者神識之體運用之源故徧方而得其主動用而獲其神不可以象數言不可以物類取皆在心內運天經五臟六腑各有所司皆有法象同天地順陰陽自然感攝之道故曰運天經也晝夜存之自長生依上五神服色思存不捨不死之道也仙經曰存五臟之氣變爲五色雲常在頂上覆蔭一身日居於前月居於後左靑龍右白虎前朱雀後玄武卽去邪長生之道也肺部之宮似華蓋金宮也肺在五臟之上四垂爲宮也下有童子坐玉闕童子名皓華肺形如蓋故以下言之玉闕者腎中白氣上與肺連也七元之子主調氣元陽子曰七元之君負甲持符辟除凶邪而布氣七竅主耳目聰明七元七竅之元氣也外應中嶽鼻臍位中嶽者鼻也又爲臍也臍爲崑崙之山鼻爲七氣之門位猶主也素錦衣裳黃雲帶素錦衣裳肺膜之色也黃雲帶者肺中之黃脉蔓延羅絡有象雲氣喘息呼吸體不快有時而然急存白元和六氣白元君主肺宮也大洞經云白元君者居洞房之右是也神仙久視無災害邪不干正用之不已形不滯常存此道形氣華榮至誠感神之所致也心部之宮蓮含華火宮也心臟之質象蓮華之未開也下有童子丹元家心神丹元字守靈神在心內而云下者據華蓋而言主適寒熱榮衞和寒熱陰陽靜躁之義也人當和適以榮衞其身老子云躁勝寒靜勝熱淸淨以爲天下正丹錦飛裳披玉羅象心臟之色也有肺之白氣象玉羅金鈴朱帶坐婆娑金鈴內蘂之象朱帶血脉之象坐婆娑者言神之安靜也九眞經云黃老君帶流金之鈴仙服也調血理命身不枯心安體和則无病夭外應口舌吐五華心主口舌吐納五臟之液辯識五行之味故言外應臨絶呼之亦登蘇有病厄當存丹元童子朱衣赤冠以救護之也久久行之飛太霞常修此道能獲飛仙肝部之宮翠重裏木宮也肝色蒼翠大小相重之象也下有靑童神公子肝東方木位主靑故曰靑童左位爲公子公子一名含明上有華蓋故曰下主諸關鏡聰明始於時主春靑陽之本始於竅主目五行之關鏡也故曰聰明之始靑錦披裳佩玉鈴靑錦肝之色玉鈴白脉垂之象也昇玄經云三天玉帝帶火玉之珮素靈經云靈耀君衣靑錦單裳皆神仙之服也和制魂魄津液平內指事也東春和煦萬物生成外應眼目日月淸肝位屬眼象日月明百痾所鍾存無英左爲無英肝神在左故存之有本爲無英無英者物生之象也同用七日自充盈五藏兼存故言同用七日爲一竟一竟一復也故周易曰七日來復是也垂絶念神死復生存念靑衣童子形如上說攝魂還魄永无傾太微靈書云每月三日十三日二十三日夕三魂棄身遊外攝之者當仰眠去枕伸足交手心上瞑目閉氣三息叩齒三通存心中有赤氣如雞子從內出於咽中赤氣轉大覆身變成火以燒身使币覺體中小熱呼三魂名曰爽靈胎光幽精卽微咒曰太微玄宮中黃始靑內鍊三魂胎光安甯神寶玉室與我俱生不得妄動鑒者太靈若欲飛行唯詣上淸若有飢渴得飲玄水玉精又每月朔望晦日七魄流蕩交通鬼魅制檢還魄之法當此夕仰眠伸足掌心掩兩耳令指相接於項上閉息七遍叩齒七通心存鼻端白氣如小豆大須臾漸大冠身上下九重氣忽變成兩靑龍在兩目中兩白虎在兩鼻孔中皆向外朱鳥在心上向人口蒼龜在左足下靈蛇在右足下兩玉女著錦衣手把火光當兩耳門畢咽液七過呼七魄名曰尸狗伏矢雀陰吞賊非毒除穢臭肺卽微咒曰素氣九囘制魄邪姦天獸守門嬌女執關鍊旣和柔與我相安不得妄動看察形源若有飢渴聽飲月黃日丹腎部之宮玄闕圓水宮也玄闕圓者腎之形狀也玄水色內象諭也中有童子冥上玄腎爲下玄其神玄冥字育嬰心爲上玄上玄幽遠氣與腎連故言冥上玄主諸六府九液源五臟六腑九液交連百脉通流廢一不可六腑如上說九液九竅之津液外應兩耳百液津腎宮主耳氣衰則聾陰陽和合二液流通蒼錦雲衣舞龍幡蒼錦腎色之象也雲衣腎膜之象也龍幡靑脉之象也九眞經云道君服靑錦衣蒼華之裙也上致明霞日月煙腎氣充足耳目聰明陰陽不衰外象諭也百病千災急當存元陽子曰寒暑相生男女相成腎中二神常衣靑左男戴日右女戴月存想見之則永無災患者也兩部水王對生門腎臟雙對故曰兩部腎宮水王則化爲赤子故曰對生門使人長生昇九天赤子化爲眞人
