body:
  text: 梁丘子注脾部章第十三脾部之宫屬戊己土宫也戊巳中央之辰也中有明童黃裳裹明童謂魂停黃裳土之色消殼散氣攝牙齒脾為五臟之樞脾磨食消性氣乃金齒為羅千故攝牙齒是為太倉兩明童太倉脾府此明童謂脾神神名混康坐在金一城九重注念存思神狀當然方圓一寸命門中即黃庭之中丹田之所也主調百榖五味香口中滋味脾磨之所致也辟却處羸無病傷內指事也食消故也外應尺宅氣色芳尺宅面也飢飽虛羸形手面色光華所生以表明示知虛實黃錦玉衣帶虎章脾主中黃謂黃庭真人服錦衣也玉清隱書云太上道君佩神虎大章也注念三老子輕翔三老謂元老玄老黃老之君也念脾中真人自然變化子謂受黃庭之學長生髙仙遠死殃莊子曰方生方死方死方生方可方不可方不可方可以此而談其理均也故長生者不死寂滅者不生不死不生則真長生不生不死則真寂滅何死殃之所及也膽部章第十四膽部之宫六腑精膽胃大腸小腸膀胱三焦為六腑也太平經云積精成青故膽為六腑之精也中有童子矅威明文云膽神龍矅字威明勇捍之義也雷電八根掦玉旌八方雷震有威怒之象也玉旌剛氣之色也龍旗橫天擲火鈴膽青龍之色旌旗威戰之具也火鈴者膽邊肉珠之象也怒則奮張故言擲也主諸氣力攝虎兵膽力互用主於捍難故攝虎兵外應眼童鼻柱間內指事也心之喜怒形於眉目之間腦髮相扶亦俱鮮人之震怒髮上衝冠九色錦衣緑華裙青錦東方九氣之色也緑華裙膽膜之象佩金帶玉龍虎文膽神威明之服飾也能存威明乘慶雲內象喻也思存膽神不倦則仙道可致也役使萬神朝三元三元道君各處三清之上諸天神仙并朝宗之致也脾長章第十五脾長一尺掩太倉太倉胃也中黃經云胃為太倉君元陽子曰脾正橫在胃上也中部老君治明堂脾黃庭之宫也黃老君之所治上應明堂眉間入一寸是也厥字靈元名混康脾磨食消內外相應大腸為胃之子混元而受納之康安治人百病消榖糧胃管榮華則無疾傷黃衣紫蒂龍虎章脾居胃上故曰黃衣也紫帶龍虎章胃絡之象長精益命賴君王太倉混康為君為王三呼我名神自通思胃腑之神則心虛洞鑒也三老同坐各有朋上元老君居上黃庭宫與泥丸君蒼華君青城君及明堂中君居洞房中父母及天庭真人等共為朋又中玄老君居中黃庭宫與赤城童子丹田君皓華君含明君英玄君丹元真人等為朋也下簧老君居下黃庭宫與太一君魂停君靈元君太倉君丹田真人等為朋也常存三老和合百神流通部位營衛無有差失也或精或胎别執方玉曆經云下丹田者人命之根本精神之所藏五氣之元也在臍下三寸附著脊號為赤子府男子以藏精女人以藏胎主和合赤子隂陽之門户也其丹田中氣左青右黃上白下黑桃孩合延生華芒桃孩隂陽神名亦曰伯桃仙經曰命門臍宫中有大君名桃孩字合延衣朱衣紫芙蓉冠暮卧存之六甲六丁來侍人也生華芒謂隂陽之氣不衰也男女徊九有桃康男女合會必存三丹田之法桃康丹田下神名主隂陽之事徊三為九故曰徊九大洞真經云三元隱化則成三宫三宫中有九神謂上中下三元君太一公子白元無英司命桃康各有宫室故曰有挑康道父道毋對相望隂陽兩半成一故曰相望師父師毋丹玄鄉道為宗師隂陽之主也丹玄鄉謂存丹田法也可用存思登虛空學仙之道殊途一會歸要終合三以為一散一以為三此道之要也玄妙內篇云兆欲長生三一當明閉塞三關極固停文云口為天關精神機手為人關把盛衰足為地關生命扉又臍下三寸為關元亦曰三關言固精護氣不妄施泄含漱金醴吞玉英金體玉英口中之津液大洞經云服玄根之法心存胃口方一女子嬰兒形元衣服正立胃管張口承注魂液仰翕五氣當漱滿口中內外津液滿口咽之遣入玄女口中五過畢叩齒三通咽液九遇也遂至不死三蟲亡洞神訣云上蟲白而青中蟲白而黃下蟲白而黑人死三蟲出為尸鬼各化為物與形為殃擊之衝破也其餘衆蟲皆隨尸而亡故學仙者精謹備於五情之氣然後服食藥物以去三蟲又云上尸彭琚使人好滋味嗜欲凝滯中尸彭質使人貪財寶好喜怒下尸彭矯使人變衣服耽淫女色亦名三毒心意常和致欣昌道通元礙五嶽之雲氣彭亨五臟之氣為五嶽之雲彭亨流道無擁之稱也保灌玉盧以自償玉廬鼻廬也言三蟲既亡真氣和洽出入玄牝綿綿不絶故四自債五形完堅無災殃五體五臟自然相應故也上覩章第十六上覩三元如連珠三元謂三光之元日月星也非指上中下之三元也落落明景照九隅三光在上而下濁九隅九隅九方也言常存日月洞照一身也五靈夜燭煥八區五靈謂五星也炳煥羅列一身常能存之則與天同休也子存內皇與我逰大道無心有感則應身披鳳衣銜虎符仙官之服御者一至不久升虛無一者無二之稱也學道專一與虛同體則神仙可致也莊子云人能知一萬事畢方寸之中念深藏方寸之中謂下關元在臍下三寸方圓一寸男子藏精之所言謹閉藏之不方不圓閉牖窗方靜圓明不動不靜但當社塞不妄泄也三神還精老方壯還精神於三田則久壽延年也魂魄內守不爭競魂陽魄隂各得其一故易曰一陰一陽之謂道神生腹中銜玉璫腹心內明口吐珠玉按五神行事訣云兩眉間直入一寸為玉璫紫闕竊觀文意未應是此也靈注幽闕那得喪存神守一無橫夭也琳條萬尋可蔭仗外象諭也琳條玉樹葛尋高遠象身形同真則神明之所死蔭者也三魂自寧帝書命真道既成名書帝籙靈臺章第十七靈臺鬱藹望黃野靈臺心也謂心專一存見黃庭黃庭即黃野也三寸異室有上下三丹四上中下三處各異每室方圓一寸故云三寸今人猶謂心為方寸即一所間關營衛高玄受三田之間各有間關營衛分部至髙至玄心當受以存念之也洞房紫極靈明户大洞經云兩眉間直上却入三分為守寸雙田入骨際三分有臺闕明堂正深七分左為青房右為紫户却入一寸為明堂宫左有明童真君右有明女真官中有明鏡神君却入二寸為洞房左有無英君右有白元君中有黃老君却入三寸為丹田宫亦名泥丸宫左有上元赤子右有帝卿君却入四寸為流珠宮有流珠真神居之却入五寸為玉帝宫有上清神毋君之其明堂上一寸為天庭宫上清真女居之洞房上一寸為極真宫太極帝妃居之丹田上一寸為玄丹宫中黃太一真君居之流珠上一寸為太皇宫太上真君居之故曰靈門户也是昔太上告我者我者扶桑太帝君自謂也言我道成承昔道君授以黃庭之術也言此道不遠止下丹田故即言是昔也左神公子發神語據大洞經左有無英此云公子亦互言耳發神語者用心專一則教之以道右有白九併立處右為學道者之侍明堂金匱玉房間皆上元之宫釋如下說也上清真人當吾前上元部神想在天庭之際黃裳子丹氣頻煩謂中元童子庭於赤城頻煩氣盛不表竭借間何在兩眉竭明堂之前內俠日月列宿陳五晨行事訣云太上真人招五辰於洞房南極元君受傳每夜年坐卧心存西方太白星在兩眉間直上一寸入一寸為玉璫紫闕在日右月又次存北方辰星在帝鄉玄宫在髮際下五分直入一寸也又次存東方歲星在洞闕朱臺洞闕朱臺在目後一寸直入一寸是也又次存南方焚惑星在玉門華房玉門華房在兩目㫮際直入五分是也又次存中央鎮星在金匱黃室長谷黃室長谷在人中直入二分是也存之綴懸於上畢叩齒五通咽液二十五過微呪曰高元紫關中有五神寶矅敷暉放光衝門精氣積生化為老人首巾素容緑帔絳裙右帶流鈴左佩虎真手把天剛散絳飛晨足躡華蓋吐芒鍊身三景保守令我得真養魄制魄乘飆飛仙是其事也內象諭七矅九元冠生門七矅七星配人之七竅九元九辰配人之九竅發一不丁故曰生門三關童第十八三關之內精氣深謂關元之中男子藏精之所也又據下文口手足為三關又元陽子以明堂洞房丹田為三關并可以義取而存也九微之中幽且隂上清大洞經云三元隱化則成三宫是名太清太素太和三三如九故有三丹田又有三洞房合上三元為九宫九宫中精微故曰九微言幽玄而不可見也口為天關精神機言發於情猶樞機也足為地關生命棐言運用已身而生也棐或為扉手為人關把盛衰縱捨由己若得章第十九若得三宫存玄丹三丹田之宫故曰三宫玄丹丹元謂心也存思在心故偏指一所也太一流珠安崑崙太一流珠謂心精洞神經云頭為三台君又為崑崙指上丹田也又云臍為太一君亦為崑崙指下丹田也言心存三田諸神皎然在目前本經曰子欲不死修崑崙山名也重中樓閣十二環謂喉龍十二環相重在心上心為絳宫有象樓閣者也自髙自下皆真人高下三田十二樓閣皆有真神有如上說玉堂絳字盡玄宫絳官明堂上下相應皆宫室也璇璣玉衡色蘭玕喉骨環圓動轉之象也蘭玗其色也瞻望童子坐槃桓存見赤城童子子丹真人坐言其神安靜問誰家子在我身言巳有之此人何丢入泥丸與上元諸神上下相應洞神經云腦為泥丸宫千千百百自相連神本出於一一生二二生三三生萬物變化不離身心一一十十似重山存見萬神重疊安坐山象坐形雲儀玉華俠耳門雲儀玉華鬢髮之號言耳居其間經曰髮神名蒼華几言華者敷榮之義猶草木之花赤常黃老與我魂赤帝南方之帝君也黃老者中黃老君也魂為陽神魄為隂神隂陽相應故言與我魂太微靈書云人有三魂一曰爽靈二曰胎光三曰幽精常呼念其名則魂不離人身也三真扶胥共房津魂與赤帝黃老為三真言相應扶胥同津共氣者也五斗煥明是七元五斗星北斗又靈寶經有五方之斗亦為五斗調房訣云存九元七元者眠起初卧及食畢微呪曰五星開通六合紫房回元隱道豁落七辰生魂者玄父變一成神生魄者玄母化二生身攝吾筋骨者公子為吾精氣者白元長生久視飛仙十天日月飛行六合間天地內為六合存念身中日月星辰森羅萬象一如天地之間了了然也帝鄉天中地戶端眉上髮際五分直入一寸亦為帝鄉又明堂上一寸為天庭天庭即天中也又鼻為上部之地户心存日月星辰等諸神皆當在其端端謂之鼻上髮際之下面部魂神皆相存內外心神自相應也呼吸章第二十呼吸元氣以求仙採飛根採玄矅吞五牙把九霞服食胎息之道皆謂天地隂陽四時五行之氣仙公公子巳可前此洞房訣也洞房宫左為無英君一名公子仙公直指黃庭學者言學黃庭仙公復行洞房之訣而存見公子故言在前朱烏吐縮白石源朱鳥舌象白石齒象吐縮導引津液謂隂陽之氣流通不絶故曰源結精育胞化生身本巳之所從來留胎止精可長生真誥曰上清真人口訣夫學仙之人安心養神服食治病使腦宮填滿玄精不傾然後可以存神服氣呼吸二景若數行交接漏泄施瀉者則氣穢神亡精靈枯竭雖復玄挺玉籙金書太極者將亦何解於非生乎在昔先師常戒於斯事云學生之人一交接則傾一年之藥勢二交接則傾二年之藥勢過此巳往則不上之藥都傾於身是以真仙常慎於此以為生主之大忌也三氣右徊九道明三氣謂三丹田之氣右徊言周流順序調和隂陽則四關九竅通流朗徹而無病也正一含華乃充盈存正守一神氣華榮故能充滿六合乘物而變遙望一心如羅星存見赤城童子居在城中如星之映羅殼金室之下不可傾謂心石肺下肺主金其色白故曰金室常能存之長生不死也延我白首及孩嬰內指事也謂童顔不老也瓊室章第二十一瓊室之中八素集謂上元清真瓊室體骨之象也泥丸夫人當中立經云洞房中有父母母即夫人也亦名道母泥丸洞房上巳釋長谷玄鄉繞郊邑長谷鼻也玄鄉腎也郊邑謂五臟六腑也言鼻中之氣出入下與腎連周鏡臟腑心居赤城存想內外郭外曰郊故為象論也六龍散飛難分别言六腑之氣微妙潜通難可分別當害存之也長生至慎房中急氣亡液漏體腦枯竭雖益以畎澮而泄以尾閭不可不慎也何為死作令神泣房中不慎傷精失明故神泣也忽之褐鄉三靈殁禍鄉死地三靈三魂也謂爽靈胎光幽精殁亡者也但當吸氣録子精呼吸吐納閉房止精寸田尺宅可治生謂三丹田之宅各方一寸故曰寸田依存丹田之法以理生也經云寸田尺宅彼尺宅謂面也若當决海百漬傾謂房中淫泄不知閉止也葉去樹枯失青青象人死無生氣氣亡液漏非已形仙經云閉房鍊液不多言不遠唾反是亡矣專閉御景乃長寧專閉情欲存服日光老子曰善閉者無關楗而不可開又上清紫文靈書有採飛根之法常以日初出東向叩齒九通畢隂呪日魂名日中五帝字日魂珠景照韜緑映回霞赤童玄炎飈象祝呼此十六字畢冥目握固存五色流霞來接一身於是日光流霞俱入口中名曰日華飛根玉胞玉胞水毋也向日吞霞四十五咽畢又咽液九過也保我泥丸三奇靈泥丸上丹田也大洞經云三元隱化則成三宫一曰太清之中三君二曰三丹田之神三曰符籍之神故曰三竒靈也恬淡閉視內自明謂存思三丹田之法一如上說物物不干泰而平行道真正邪物不干愨矣匪事老復丁猛獸不據攫鳥不搏老者反壯病者皆強愨矣必然思詠玉書入上清精研內景必獲仙道常念章第二十二常念三房相通達三房謂明堂洞房丹田之房也與流珠玉帝天庭極真玄丹泥九太皇等諸宫左右上下皆相通達洞得視見無內外存思丹田三三如九合為一明朗洞徹無有內外也存漱五牙不飢渴靈寶有服御五牙之法五牙者五行之生氣以配五臟元精經云常以立春之日雞鳴時入室東向禮九拜平坐叩齒九通思存東方安寶華林青靈如老帝君九千萬人下降室內鬱鬱如雲以覆巳形從口中入直下肝腑祝曰九氣青天元始上精皇老尊神衣服羽青役御天官煥明歲星散耀流芳淘溉我形上食朝霞服引木精固養青牙保鎮朽零肝腑充盈玉芝自生延年駐壽色反童嬰五氣混合天地長并畢引青氣九咽止便服東方赤書玉文十二字也餘南方西方北方中央依按靈寶服御五牙之法而行之神華執巾六丁謁神華者玉曆經云太隂玄光玉女道之母也衣五色朱衣在脾腑之上黃雲華蓋之下六丁者謂六丁陰神玉女也老君六甲符圖云丁卯神司馬卿玉女足日之丁丑神趙子玉玉女順氣丁亥神張文通玉女曹漂之丁酉神臧文公玉女得喜丁米神石叔通玉女寄防丁巳神崔巨鄉玉女開心之言服鍊飛根存漱五牙之道成則役使六丁之神急守精室勿妄泄精室謂三丹田上下資連而不絶制之在心心即中丹田也緩急之所由真妄之根本也閉而寶之可長活積精之所致也起自形中初不闊調心使氣微妙無形三宫近在易隱括謂三丹田真官近在人身隱括精氣常以心為君主者也虛元寂寂空中素外指事也素有二說使形如是不當汙使形輕淨如懸縑素於空中也又云身中空虛使如器之漆素虛靜當然汙謂有其事也九室正虛神明舍九室謂頭中九宫之室及人之九竅使上宫榮華九竅真正則衆神之所止舍也洞神經云天有九星兩星隱故稱九天地有九宫故稱九地人有九竅故稱九生言人所由而生也存思百念視節度存念身中百神呼吸上下一如科法文云千千百百似重山皆神象六府修治勿令故按洞神經云六府者謂肺為玉堂宫尚書府心為絳宫元陽府肝為清泠宫蘭臺府膽為紫微宫無極府腎為幽昌宮太和府脾為中黃宫太素府異於常六府也行自翔翔入天路謂升仙羽化也治生章第二十三治生之道了不煩無為清簡約以守志但修洞玄與玉篇洞玄謂洞玄靈寶玉篇真文黃庭也兼行形中八景神玉緯經云五臟有八卦天神宿衛太一八使者立八節日八卦合太一為九宫八卦外有十二樓樓謂喉嚨也臍中為太一君主人之命也一名太極一名太淵一名崑崙一名持軀主身中萬二千神也二十四真出自然天有一十田真氣人身亦有之又三丹田之所三八二十四真人皆自然之道氣也髙拱無為魂魄安行忘坐忘離形去智清靜神見與我言能清能靜則心神自見幾覽無外而與巳言即謂黃庭真人安在紫房幃慔間紫房幃幕一名絳宫謂赤城中童子所安之處存思心神其狀如此立坐室外三五玄謂八景及二十四真神營護人身則三田五藏真氣調柔無炎病也燒香接手玉華前玉華即華蓋之前謂眉間天庭也百神之宗元真人之窟宅當仰面而存之也共入太室璇璣門洞房經云天有太室玉房雲庭雲庭中央黃老君之所居也玉房一名紫房一名絳宫通名明堂上有華蓋東西宫洞通左右黃庭之內人身具有之如上文說璇璣中樞名髙研恬淡道之園研精恬淡真氣來遊內視密眄盡覩真入靜思存百神森森真人在巳莫問鄰玉曆經云老子者天地之魂自然之君常侍道君在左右人身備有之何處遠索求因緣老子曰大道泛兮其可左右言不遠也黃庭內景玉經注卷中
